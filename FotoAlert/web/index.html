<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FotoAlert">
  <meta name="theme-color" content="#f0a030">
  <title>FotoAlert</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

  <style>
    /* ── Design Tokens ────────────────────────────────────────────── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #141420;
      --card:      #1c1c2a;
      --border:    #2a2a3a;
      --gold:      #f0a030;
      --gold-dim:  rgba(240,160,48,.15);
      --blue-h:    #5080f0;
      --text:      #e8e8f4;
      --muted:     #7878a0;
      --green:     #4caf70;
      --orange:    #f08030;
      --red:       #e05050;
      --radius:    14px;
      --tab-h:     64px;
      --safe-b:    env(safe-area-inset-bottom, 0px);
    }

    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px; -webkit-font-smoothing: antialiased; }

    /* ── Layout ──────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100%; }

    /* Header */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 52px 16px 12px;
      background: linear-gradient(180deg, var(--surface) 60%, transparent);
      flex-shrink: 0; z-index: 10;
    }
    #header h1 { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: -.3px; }
    #header .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
    #refresh-btn { background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 8px; border-radius: 50%; transition: color .2s; }
    #refresh-btn:hover { color: var(--gold); }
    #refresh-btn svg { width: 20px; height: 20px; }
    #search-btn { background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 8px; border-radius: 50%; transition: color .2s; }
    #search-btn:hover { color: var(--gold); }
    #search-btn svg { width: 20px; height: 20px; }
    /* Search bar overlay in header */
    #search-bar {
      display: none; align-items: center; gap: 8px;
      position: absolute; left: 0; right: 0; top: 0; bottom: 0;
      background: var(--surface); padding: 0 16px; z-index: 20;
    }
    #search-bar.open { display: flex; }
    #search-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; color: var(--text);
      font-size: 16px; outline: none;
    }
    #search-input:focus { border-color: var(--gold); }
    #search-cancel { background: none; border: none; color: var(--gold);
      font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; padding: 4px 0; }

    /* Pages */
    #pages { flex: 1; overflow: hidden; position: relative; }
    .page { position: absolute; inset: 0; overflow-y: auto; padding-bottom: calc(var(--tab-h) + var(--safe-b) + 8px);
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch; opacity: 0;
      pointer-events: none; transition: opacity .15s; }
    .page.active { opacity: 1; pointer-events: auto; }

    /* Tab Bar */
    #tab-bar {
      display: flex; background: var(--surface); border-top: 1px solid var(--border);
      height: calc(var(--tab-h) + var(--safe-b)); padding-bottom: var(--safe-b);
      flex-shrink: 0; z-index: 20;
    }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 10px; font-weight: 500;
      letter-spacing: .3px; transition: color .15s; padding: 8px 0; }
    .tab svg { width: 22px; height: 22px; }
    .tab.active, .tab:hover { color: var(--gold); }
    .tab#tab-add { color: var(--bg); }
    .tab#tab-add .tab-icon-wrap {
      background: var(--gold); border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center; margin-bottom: -6px;
    }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
      padding: 14px; margin: 6px 12px; cursor: pointer;
      transition: border-color .2s, transform .1s; }
    .card:active { transform: scale(.98); }
    .card:hover { border-color: var(--gold); }

    /* ── Opportunity Card ─────────────────────────────────────────── */
    .opp-card { display: flex; gap: 12px; align-items: flex-start; }
    .score-ring-wrap { flex-shrink: 0; width: 52px; height: 52px; position: relative; }
    .score-ring-wrap svg { width: 52px; height: 52px; transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
    .score-ring-fg { fill: none; stroke-width: 4; stroke-linecap: round;
      transition: stroke-dashoffset .6s ease; }
    .score-label { position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; transform: none; }
    .score-label span:first-child { font-size: 14px; font-weight: 800; line-height: 1; }
    .score-label span:last-child  { font-size: 8px; color: var(--muted); }
    .priority-dot { position: absolute; top: 0; right: 0; width: 10px; height: 10px;
      border-radius: 50%; background: var(--gold); border: 2px solid var(--card);
      display: none; }

    .opp-body { flex: 1; min-width: 0; }
    .opp-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .opp-icon { font-size: 13px; }
    .opp-type { font-size: 11px; color: var(--muted); }
    .opp-time { font-size: 11px; color: var(--text); margin-left: auto;
      font-variant-numeric: tabular-nums; }
    .opp-title { font-size: 14px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .opp-location { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .opp-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
    .tag-blue  { color: var(--blue-h); background: rgba(80,128,240,.15); }
    .tag-gold  { color: var(--gold);   background: var(--gold-dim); }
    .tag-warn  { color: var(--orange); background: rgba(240,128,48,.15); }
    .tag-weather-unknown { color: var(--muted); background: var(--border); }

    /* Section headers */
    .section-head { display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 4px; font-size: 12px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
    .section-head svg { width: 13px; height: 13px; }

    /* Alert banner */
    #alert-banner { margin: 8px 12px; background: linear-gradient(135deg, rgba(240,160,48,.12), rgba(80,128,240,.08));
      border: 1px solid rgba(240,160,48,.35); border-radius: var(--radius); padding: 12px 14px; }
    #alert-banner h3 { font-size: 12px; font-weight: 700; color: var(--gold);
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .alert-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .alert-chip { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; cursor: pointer; transition: border-color .15s; }
    .alert-chip:hover { border-color: var(--gold); }
    .alert-chip .chip-icon { font-size: 18px; margin-bottom: 4px; }
    .alert-chip .chip-day  { font-size: 10px; color: var(--muted); }
    .alert-chip .chip-name { font-size: 11px; font-weight: 600; max-width: 90px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Empty state */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 32px; gap: 12px; color: var(--muted); text-align: center; }
    .empty svg { width: 48px; height: 48px; opacity: .4; }

    /* Loading spinner */
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Map Page ─────────────────────────────────────────────────── */
    #page-map { padding: 0 !important; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { background: #0d0d1a !important; }
    .leaflet-tile { filter: brightness(.85) saturate(.7); }
    /* Map layer toggle */
    #map-layer-toggle { position: absolute; top: 12px; right: 12px; z-index: 1000;
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; }
    .map-layer-btn { background: none; border: none; color: var(--muted); font-size: 12px;
      font-weight: 600; padding: 7px 12px; cursor: pointer; transition: all .15s; }
    .map-layer-btn.active { background: var(--gold); color: var(--bg); }

    /* custom popup */
    .leaflet-popup-content-wrapper { background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; }
    .leaflet-popup-tip { background: var(--card); }
    .map-popup h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--gold); }
    .map-popup p  { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .map-popup .popup-btn { font-size: 11px; background: var(--gold-dim); color: var(--gold);
      border: 1px solid var(--gold); border-radius: 6px; padding: 4px 10px; cursor: pointer;
      display: inline-block; }

    /* ── Detail Sheet ─────────────────────────────────────────────── */
    #detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #detail-overlay.open { opacity: 1; pointer-events: auto; }
    #detail-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
      background: var(--surface); border-radius: 22px 22px 0 0;
      max-height: 92vh; overflow-y: auto;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom: calc(32px + var(--safe-b)); }
    #detail-sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px;
      margin: 10px auto 0; }
    .sheet-hero { padding: 20px 20px 0; }
    .sheet-hero-type { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .sheet-hero-title { font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
    .sheet-hero-loc { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .sheet-score-bar { display: flex; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .score-col { flex: 1; text-align: center; }
    .score-col .sc-val { font-size: 20px; font-weight: 800; }
    .score-col .sc-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .sc-info-btn { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--muted); background: none; color: var(--muted); font-size: 9px; font-weight: 700; cursor: pointer; line-height: 1; padding: 0; flex-shrink: 0; }
    .sc-info-btn:hover { border-color: var(--gold); color: var(--gold); }
    /* Score-Info-Overlay */
    #score-info-overlay { display: none; position: absolute; inset: 0; z-index: 300; align-items: center; justify-content: center; background: rgba(0,0,0,.55); padding: 20px; }
    #score-info-overlay.open { display: flex; }
    #score-info-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 320px; width: 100%; position: relative; }
    #score-info-box h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    #score-info-box p, #score-info-box li { font-size: 13px; color: var(--muted); line-height: 1.55; }
    #score-info-box ul { padding-left: 16px; margin-top: 6px; }
    #score-info-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 0; }
    .sheet-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .sheet-section h4 { font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); margin-bottom: 0;
      display: flex; align-items: center; gap: 6px; justify-content: space-between; cursor: pointer; user-select: none; }
    .sec-chev { font-size: 10px; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
    .section-body { overflow: hidden; max-height: 0; transition: max-height .25s ease; }
    .section-body.open { max-height: 4000px; padding-top: 10px; }
    .info-row { display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0; }
    .info-row .ir-label { font-size: 13px; color: var(--muted); }
    .info-row .ir-val   { font-size: 13px; font-weight: 600; }
    .camera-card { background: var(--card); border-radius: 10px; padding: 12px;
      border: 1px solid var(--border); }
    .camera-card .cam-main { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .camera-card .cam-tip  { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .cam-warning { color: var(--orange); font-weight: 600; margin-top: 6px; font-size: 12px; }
    .time-window { display: flex; background: var(--card); border-radius: 10px;
      padding: 12px; border: 1px solid var(--border); gap: 0; }
    .tw-col { flex: 1; text-align: center; }
    .tw-col:not(:last-child) { border-right: 1px solid var(--border); }
    .tw-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .tw-time  { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .tw-optimal { color: var(--gold); }
    .sheet-actions { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
    .coords-grid { display: flex; flex-direction: column; gap: 10px; }
    .coords-row { display: flex; align-items: center; gap: 8px; }
    .coords-label { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; }
    .coords-vals { font-size: 12px; font-family: monospace; color: var(--text); flex: 1; }
    .coords-maps-btn { flex-shrink: 0; font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--gold); cursor: pointer; }
    .coords-sv-btn { flex-shrink: 0; font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid #3a7bd5; background: var(--card); color: #5b9cf6; cursor: pointer; }
    .verified-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #4caf50; background: rgba(76,175,80,.12); border: 1px solid rgba(76,175,80,.3); border-radius: 20px; padding: 3px 10px; margin-top: 6px; }
    .verified-badge-issue { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--red); background: rgba(224,80,80,.1); border: 1px solid rgba(224,80,80,.35); border-radius: 20px; padding: 3px 10px; margin-top: 6px; }
    .tag-verified { background: rgba(76,175,80,.15); color: #4caf50; }
    .tag-issue { background: rgba(224,80,80,.15); color: var(--red); }

    /* ── Star Rating (US-24) ─────────────────────────────────────── */
    .star-input { display: flex; gap: 6px; padding: 4px 0; }
    .star-btn { font-size: 30px; cursor: pointer; color: var(--border);
      transition: color .1s, transform .1s; user-select: none; line-height: 1; }
    .star-btn.filled { color: var(--gold); }
    .star-btn:hover { color: var(--gold); transform: scale(1.15); }
    .star-display { display: inline-flex; gap: 1px; }
    .star-display .s { font-size: 11px; }
    .star-display .s.on  { color: var(--gold); }
    .star-display .s.off { color: var(--border); }
    /* ── Filter (US-32) ─────────────────────────────────────────── */
    #filter-btn { background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 8px; border-radius: 50%; transition: color .2s; position: relative; }
    #filter-btn:hover { color: var(--gold); }
    #filter-btn svg { width: 20px; height: 20px; }
    #filter-badge { position: absolute; top: 2px; right: 2px; background: var(--gold);
      color: var(--bg); border-radius: 50%; width: 16px; height: 16px;
      font-size: 10px; font-weight: 800; display: none; align-items: center;
      justify-content: center; pointer-events: none; }
    #filter-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 104; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #filter-overlay.open { opacity: 1; pointer-events: auto; }
    #filter-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 105;
      background: var(--surface); border-radius: 22px 22px 0 0;
      max-height: 88vh; overflow-y: auto;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom: calc(32px + var(--safe-b)); }
    #filter-sheet.open { transform: translateY(0); }
    .filter-header { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 8px; }
    .filter-header h2 { font-size: 17px; font-weight: 700; }
    .filter-section { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .filter-section h4 { font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); margin-bottom: 10px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-chip { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card); color: var(--muted);
      cursor: pointer; transition: all .15s; user-select: none; }
    .filter-chip.active { border-color: var(--gold); color: var(--gold);
      background: var(--gold-dim); }
    .filter-actions { padding: 14px 20px; display: flex; gap: 10px; }
    .filter-slider-wrap { padding: 4px 0 2px; }
    .filter-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
      border-radius: 2px; outline: none; cursor: pointer;
      background: linear-gradient(to right, var(--gold) var(--pct, 0%), var(--border) var(--pct, 0%)); }
    .filter-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%; background: var(--gold);
      border: 3px solid var(--bg); box-shadow: 0 0 0 1px var(--gold); cursor: pointer; }
    .filter-slider-labels { display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); margin-top: 6px; }
    .filter-slider-val { font-size: 22px; font-weight: 800; color: var(--gold);
      text-align: center; margin-bottom: 4px; letter-spacing: -1px; }
    /* BUG-04: Dual-Handle Range-Slider */
    .dual-range-wrap { padding: 4px 0 0; }
    .dual-range-track { position: relative; height: 4px; background: var(--border);
      border-radius: 2px; margin: 16px 0 8px; }
    .dual-range-fill { position: absolute; top: 0; height: 100%;
      background: var(--gold); border-radius: 2px; pointer-events: none; }
    .dual-range-thumb { position: absolute; top: 50%; width: 22px; height: 22px;
      background: var(--gold); border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: grab; touch-action: none;
      box-shadow: 0 1px 4px rgba(0,0,0,.5), 0 0 0 3px rgba(240,160,48,.25);
      z-index: 1; transition: box-shadow .15s; }
    .dual-range-thumb:active { cursor: grabbing;
      box-shadow: 0 1px 4px rgba(0,0,0,.5), 0 0 0 6px rgba(240,160,48,.35); }
    .verify-form { background: var(--card); border: 1px solid rgba(76,175,80,.3); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .verify-issue-form { background: var(--card); border: 1px solid rgba(224,80,80,.3); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .issue-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .issue-chip { font-size: 12px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; transition: all .15s; }
    .issue-chip.selected { border-color: var(--red); color: var(--red); background: rgba(224,80,80,.1); }
    .btn-issue { flex: 1; background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .verify-form textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 8px 10px; resize: vertical; min-height: 60px; font-family: inherit; }
    .verify-form textarea::placeholder { color: var(--muted); }
    .verify-form-actions { display: flex; gap: 8px; }
    .btn-verify { flex: 1; background: #4caf50; color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-verify-cancel { flex: 0; background: var(--card); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 14px; cursor: pointer; }
    .btn-primary { background: var(--gold); color: var(--bg); border: none; border-radius: 12px;
      padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s; }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer;
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color .15s; }
    .btn-secondary:hover { border-color: var(--gold); }

    /* ── Add Location Sheet ───────────────────────────────────────── */
    #add-sheet { position: fixed; inset: 0; z-index: 110;
      background: var(--surface); border-radius: 0;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); }
    #add-sheet.open { transform: translateY(0); }
    #add-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 109;
      opacity: 0; pointer-events: none; transition: opacity .25s; }
    #add-overlay.open { opacity: 1; pointer-events: auto; }
    .add-header { padding: 14px 20px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .add-header h2 { font-size: 18px; font-weight: 800; }
    .close-btn { background: var(--card); border: none; color: var(--muted); border-radius: 50%;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; }
    .add-map-container { flex: 1; min-height: 0; position: relative; }
    #add-map { width: 100%; height: 100%; }
    /* Fadenkreuz beim Pin-Setzen, Grab beim Verschieben */
    #add-map .leaflet-grab { cursor: crosshair; }
    #add-map .leaflet-dragging .leaflet-grab { cursor: grabbing; }
    .add-map-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.75); color: #fff; font-size: 11px;
      padding: 4px 12px; border-radius: 20px; pointer-events: none; white-space: nowrap; z-index: 10; }
    .map-mode-bar { display: flex; gap: 6px; padding: 6px 12px; background: var(--bg); flex-shrink: 0; }
    .map-mode-btn { flex: 1; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; }
    .map-mode-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .add-form { padding: 12px 20px; overflow-y: auto; flex-shrink: 0; max-height: 42dvh;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }
    .form-section { margin-bottom: 16px; }
    .form-section label { display: block; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .gps-row { display: flex; gap: 8px; }
    .gps-display { flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: 13px;
      font-variant-numeric: tabular-nums; color: var(--muted); }
    .gps-display.set { color: var(--text); border-color: var(--green); }
    .gps-btn { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold);
      border-radius: 10px; padding: 10px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; }
    .input-field { width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: 14px; color: var(--text);
      outline: none; transition: border-color .2s; }
    .input-field:focus { border-color: var(--gold); }
    .input-row { display: flex; gap: 8px; }
    .input-row .input-field { flex: 1; }
    /* Location Edit Form */
    .edit-form { padding: 16px 20px; }
    .edit-form label { display: block; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .edit-form .input-field { margin-bottom: 14px; }
    textarea.input-field { resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.5; }
    .geocode-row { display: flex; gap: 8px; align-items: flex-start; }
    .geocode-row textarea { flex: 1; }
    .geocode-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: 10px 12px; font-size: 16px; cursor: pointer;
      transition: border-color .2s, color .2s; white-space: nowrap; flex-shrink: 0; margin-top: 0; }
    .geocode-btn:hover { border-color: var(--gold); color: var(--gold); }
    .edit-actions { display: flex; gap: 8px; margin-top: 4px; }
    .coord-pair { display: flex; gap: 6px; }
    .coord-pair .input-field { flex: 1; font-size: 12px; padding: 8px 10px; }
    .coord-actions { display: flex; gap: 6px; margin-top: 6px; }
    .paste-btn { background: var(--card); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: border-color .2s, color .2s; }
    .paste-btn:hover { border-color: var(--gold); color: var(--gold); }
    .coord-error { font-size: 11px; color: #ff6b6b; margin-top: 4px; min-height: 14px; }
    .preview-box { background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin: 8px 0; }
    .preview-box h4 { font-size: 12px; color: var(--muted); font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
    .preview-stat { display: flex; justify-content: space-between;
      padding: 4px 0; font-size: 13px; }
    .preview-stat .ps-label { color: var(--muted); }
    .preview-stat .ps-val   { font-weight: 700; }
    .preview-alignments { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .align-row { display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border); }
    .align-row:last-child { border-bottom: none; }
    .align-row .ar-type { font-size: 12px; color: var(--gold); }
    .align-row .ar-time { font-size: 12px; color: var(--muted); }
    .align-row .ar-score { font-size: 11px; font-weight: 700; }

    /* ── Feed-Modus Toggle ───────────────────────────────────────── */
    .feed-mode-bar { display: flex; gap: 6px; padding: 10px 14px 6px;
      background: var(--bg); position: sticky; top: 0; z-index: 5; }
    .fmb-btn { flex: 1; padding: 7px 10px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s; }
    .fmb-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

    /* ── Kalenderansicht ─────────────────────────────────────────── */
    .cal-nav { display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; }
    .cal-nav-title { font-size: 15px; font-weight: 700; }
    .cal-nav-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 5px 12px; font-size: 14px; cursor: pointer; }
    .cal-status { padding: 6px 16px 2px; font-size: 11px; color: var(--muted); }
    .cal-day-head { padding: 12px 16px 4px; font-size: 12px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
      border-top: 1px solid var(--border); margin-top: 4px; }
    .cal-event { display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .15s; }
    .cal-event:active { background: var(--card); }
    .cal-event-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
    .cal-event-body { flex: 1; min-width: 0; }
    .cal-event-title { font-size: 13px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .cal-event-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .cal-event-score { font-size: 12px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
    .cal-loading { display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 12px; color: var(--muted); }

    /* ── Locations Page ───────────────────────────────────────────── */
    .loc-card { display: flex; gap: 12px; align-items: center; }
    .loc-icon { width: 40px; height: 40px; border-radius: 10px; display: flex;
      align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .loc-body h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .loc-body p  { font-size: 12px; color: var(--muted); }
    .loc-diff { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      margin-left: auto; flex-shrink: 0; }
    .diff-1 { color: var(--green);  background: rgba(76,175,112,.15); }
    .diff-2 { color: var(--orange); background: rgba(240,128,48,.15); }
    .diff-3 { color: var(--red);    background: rgba(224,80,80,.15); }

    /* ── Location Detail Sheet ───────────────────────────────────── */
    #loc-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 102; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #loc-detail-overlay.open { opacity: 1; pointer-events: auto; }
    #loc-detail-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 103;
      background: var(--surface); border-radius: 22px 22px 0 0;
      max-height: 92vh; overflow-y: auto;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom: calc(32px + var(--safe-b)); }
    #loc-detail-sheet.open { transform: translateY(0); }
    .loc-impossible-warn { margin: 0 20px 4px; background: rgba(224,80,80,.1);
      border: 1px solid rgba(224,80,80,.35); border-radius: 12px; padding: 12px 14px; }
    .loc-impossible-warn p { font-size: 13px; color: var(--red); line-height: 1.5; }
    .body-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .body-chip { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
    .body-chip.possible   { background: rgba(80,200,120,.15); color: #4ec87a; border: 1px solid rgba(80,200,120,.4); }
    .body-chip.impossible { background: rgba(130,130,130,.1); color: var(--muted); border: 1px solid rgba(130,130,130,.25); text-decoration: line-through; }
    .loc-next-event-row { display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; }
    .loc-next-event-row:last-child { border-bottom: none; }
    .loc-next-event-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
    .loc-next-event-body { flex: 1; min-width: 0; }
    .loc-next-event-title { font-size: 13px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .loc-next-event-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .loc-next-event-score { font-size: 12px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
    .loc-maps-btn { display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; padding: 5px 11px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); color: var(--gold); cursor: pointer; text-decoration: none; }

    /* Search bar */
    .search-wrap { padding: 8px 12px; position: sticky; top: 0; background: var(--bg); z-index: 5; }
    .search-input { width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px 10px 36px; font-size: 14px; color: var(--text);
      outline: none; transition: border-color .2s; }
    .search-input:focus { border-color: var(--gold); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; }

    /* ── Settings Page ────────────────────────────────────────────── */
    .settings-section { padding: 12px 16px 4px; }
    .settings-section h3 { font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px; padding: 0 4px; margin-bottom: 6px; }
    .settings-group { background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden; }
    .settings-row { display: flex; align-items: center; padding: 13px 16px;
      border-bottom: 1px solid var(--border); gap: 12px; }
    .settings-row:last-child { border-bottom: none; }
    .settings-row .sr-label { flex: 1; }
    .settings-row .sr-label span { display: block; font-size: 14px; font-weight: 500; }
    .settings-row .sr-label small { font-size: 11px; color: var(--muted); }
    .toggle { appearance: none; width: 44px; height: 26px; background: var(--border);
      border-radius: 13px; cursor: pointer; position: relative; transition: background .2s;
      flex-shrink: 0; }
    .toggle:checked { background: var(--gold); }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px;
      background: white; border-radius: 50%; top: 3px; left: 3px; transition: left .2s; }
    .toggle:checked::after { left: 21px; }
    .range-row { flex-direction: column; align-items: stretch; gap: 6px; }
    .range-row .range-label-row { display: flex; justify-content: space-between;
      font-size: 13px; }
    input[type="range"] { width: 100%; accent-color: var(--gold); }
    .server-input { background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--text);
      outline: none; width: 100%; }
    .info-badge { font-size: 11px; color: var(--muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; }

    /* ── Toast ─────────────────────────────────────────────────────── */
    #toast { position: fixed; bottom: calc(var(--tab-h) + var(--safe-b) + 12px); left: 50%;
      transform: translateX(-50%) translateY(10px); background: var(--card);
      border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px;
      font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: all .25s;
      white-space: nowrap; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar (desktop) ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (min-width: 600px) {
      #app { max-width: 480px; margin: 0 auto;
        box-shadow: 0 0 80px rgba(0,0,0,.8); }
      #header { padding-top: 20px; }
      /* BUG-07: Sheets auf App-Breite zentrieren (kein translateX – translateY-Animation bleibt intakt) */
      #detail-sheet, #loc-detail-sheet, #filter-sheet {
        left: 50%; width: 480px; right: auto; margin-left: -240px;
      }
      #add-sheet {
        left: 50%; width: 480px; right: auto; top: 0; bottom: 0; margin-left: -240px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header" style="position:relative">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#e8a020,#c45f00);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📷</div>
      <div>
        <h1>FotoAlert</h1>
        <div class="subtitle" id="header-subtitle">Berlin &amp; Brandenburg</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:2px">
      <button id="search-btn" title="Suchen" onclick="Search.open()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <div style="position:relative;display:inline-flex">
        <button id="filter-btn" title="Filter" onclick="FilterSheet.open()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
        </button>
        <span id="filter-badge">0</span>
      </div>
      <button id="refresh-btn" title="Aktualisieren" onclick="App.refresh()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      </button>
    </div>
    <!-- Search bar overlay -->
    <div id="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="search" placeholder="Location suchen…"
        oninput="Search.onInput(this.value)"
        onkeydown="if(event.key==='Escape') Search.close()">
      <button id="search-cancel" onclick="Search.close()">Abbrechen</button>
    </div>
  </div>

  <!-- Pages -->
  <div id="pages">
    <!-- FEED -->
    <div id="page-feed" class="page active">
      <div class="feed-mode-bar">
        <button class="fmb-btn active" id="fmb-feed" onclick="Feed.setMode('feed')">📋 14-Tage Feed</button>
        <button class="fmb-btn" id="fmb-calendar" onclick="Feed.setMode('calendar')">📅 Jahreskalender</button>
      </div>
      <div id="feed-content"><div class="empty"><div class="spinner"></div></div></div>
    </div>

    <!-- MAP -->
    <div id="page-map" class="page">
      <div id="map"></div>
      <div id="map-layer-toggle">
        <button class="map-layer-btn active" onclick="MapView.setLayer('dark')">Nacht</button>
        <button class="map-layer-btn" onclick="MapView.setLayer('standard')">Standard</button>
        <button class="map-layer-btn" onclick="MapView.setLayer('satellite')">Satellit</button>
      </div>
    </div>

    <!-- LOCATIONS -->
    <div id="page-locations" class="page">
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="search" placeholder="Location suchen…" oninput="Locations.filter(this.value)">
      </div>
      <div id="locations-content"><div class="empty"><div class="spinner"></div></div></div>
    </div>

    <!-- SETTINGS -->
    <div id="page-settings" class="page">
      <div id="settings-content"></div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar">
    <button class="tab active" id="tab-feed" onclick="App.nav('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Chancen</span>
    </button>
    <button class="tab" id="tab-map" onclick="App.nav('map')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Karte</span>
    </button>
    <button class="tab" id="tab-add" onclick="AddLocation.open()">
      <div class="tab-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <span style="color:var(--muted);margin-top:2px">Neu</span>
    </button>
    <button class="tab" id="tab-locations" onclick="App.nav('locations')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Locations</span>
    </button>
    <button class="tab" id="tab-settings" onclick="App.nav('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Einstellungen</span>
    </button>
  </div>
</div>

<!-- Detail Sheet -->
<div id="detail-overlay" onclick="Detail.close()"></div>
<div id="detail-sheet">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0">
    <div class="sheet-handle" style="margin:0"></div>
    <button class="close-btn" onclick="Detail.close()" aria-label="Schließen">✕</button>
  </div>
  <div id="detail-content"></div>
</div>

<!-- Add Location Sheet -->
<div id="add-overlay" onclick="AddLocation.close()"></div>
<div id="add-sheet">
  <div class="add-header">
    <div class="sheet-handle" style="margin:0"></div>
    <h2>📍 Neue Location</h2>
    <button class="close-btn" onclick="AddLocation.close()">✕</button>
  </div>
  <div class="add-map-container">
    <div id="add-map"></div>
    <div class="add-map-hint" id="add-map-hint">Modus wählen → dann auf Karte tippen</div>
  </div>
  <div class="map-mode-bar">
