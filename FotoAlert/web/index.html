<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// VERSION  (Major.Feature.Fix)
// ═══════════════════════════════════════════════════════
// Major  → grundlegende App-Überarbeitung (v2, v3 …)
// Feature → neues Feature, Minor-Bump        (v1.1, v1.2 …)
// Fix    → Bugfix, Patch-Bump               (v1.1.1, v1.1.2 …)
const APP_VERSION = '1.4.2';

// CONFIG
// ═══════════════════════════════════════════════════════
const CFG = {
  api: localStorage.getItem('fa_api') || 'http://localhost:8000',
  minScore: 0.35,  // Backend-Minimum; wird nicht mehr per Settings-Slider geändert
  notifyHigh: localStorage.getItem('fa_notify_high') !== 'false',
  notifyGolden: localStorage.getItem('fa_notify_golden') !== 'false',
  notifyMilky: localStorage.getItem('fa_notify_milky') === 'true',
};

// ═══════════════════════════════════════════════════════
// API CLIENT
// ═══════════════════════════════════════════════════════
const API = {
  async get(path) {
    const r = await fetch(CFG.api + path);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(CFG.api + path, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  },
  async patch(path, body) {
    const r = await fetch(CFG.api + path, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
};

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
const ICONS = {
  'Goldene Stunde Abend':  '🌅', 'Goldene Stunde Morgen': '🌄',
  'Blaue Stunde':          '🌙', 'Mondaufgang':           '🌕',
  'Mond-Alignment':        '🌙', 'Sonnen-Alignment':      '☀️',
  'Milchstraße':           '✨', 'Meteoritenschauer':     '💫',
  'Sonnenfinsternis':      '🌑',
};

function scoreColor(s) {
  return s >= .8 ? '#4caf70' : s >= .6 ? '#f0a030' : '#f08030';
}

function formatTime(iso, tz='Europe/Berlin') {
  return new Date(iso).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',timeZone:tz}) + ' Uhr';
}
function formatDate(iso, tz='Europe/Berlin') {
  const d = new Date(iso);
  const now = new Date();
  const todayStr = now.toLocaleDateString('de-DE',{timeZone:tz});
  const dStr = d.toLocaleDateString('de-DE',{timeZone:tz});
  if (dStr === todayStr) return 'Heute';
  const tom = new Date(now); tom.setDate(tom.getDate()+1);
  if (dStr === tom.toLocaleDateString('de-DE',{timeZone:tz})) return 'Morgen';
  return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short',timeZone:tz});
}
function pct(v) { return Math.round(v*100) + '%'; }

// Sonnenaufgang / -untergang für Berlin (UTC-Stunden, Spencer-Approximation)
// Genauigkeit ±2 min – ausreichend für Tageszeit-Filter
function berlinSunTimes(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  const start = new Date(d.getUTCFullYear(), 0, 0);
  const doy = Math.round((d - start) / 86400000); // day of year
  const lat = 52.52, lng = 13.40;
  const rad = x => x * Math.PI / 180;
  // Deklination
  const decl = -23.45 * Math.cos(rad(360 / 365 * (doy + 10)));
  // Stundenwinkel bei Sonnenauf/-untergang (Refraktion -0.833°)
  const cosH = (Math.sin(rad(-0.833)) - Math.sin(rad(lat)) * Math.sin(rad(decl))) /
               (Math.cos(rad(lat)) * Math.cos(rad(decl)));
  if (Math.abs(cosH) > 1) return null; // Polartag / Polarnacht
  const H = Math.acos(cosH) * 180 / Math.PI; // Grad
  // Zeitgleichung (Spencer, Minuten)
  const B = rad(360 / 365 * (doy - 81));
  const EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  // Solarmittag in UTC-Minuten seit Mitternacht
  const noon = 720 - 4 * lng - EoT;
  return { sunrise: (noon - 4 * H) / 60, sunset: (noon + 4 * H) / 60 }; // UTC-Stunden
}

function toast(msg, ms=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════════════════
// SCORE RING SVG
// ═══════════════════════════════════════════════════════
function scoreRing(score, priority=0) {
  const r = 22, circ = 2*Math.PI*r, dash = circ * score, col = scoreColor(score);
  const dot = priority >= 2 ? `<div class="priority-dot" style="display:block"></div>` : '';
  return `<div class="score-ring-wrap">
    <svg viewBox="0 0 52 52">
      <circle class="score-ring-bg" cx="26" cy="26" r="${r}"/>
      <circle class="score-ring-fg" cx="26" cy="26" r="${r}"
        stroke="${col}" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="0"/>
    </svg>
    <div class="score-label">
      <span style="color:${col}">${Math.round(score*100)}</span>
      <span>%</span>
    </div>${dot}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// OPPORTUNITY CARD
// ═══════════════════════════════════════════════════════
function oppCard(o) {
  const icon = ICONS[o.event_type] || '📷';
  const weatherTag = o.weather_score === 0
    ? `<span class="tag tag-weather-unknown">Wetter unbekannt</span>`
    : `<span class="tag tag-blue">☁ ${pct(o.weather_score)}</span>`;
  const prio = o.alert_priority >= 2
    ? `<span class="tag tag-gold">⭐ ${o.alert_priority >= 3 ? 'Außergewöhnlich' : 'Besonders'}</span>` : '';
  const stativ = o.camera_hints?.[0]?.tripod_required
    ? `<span class="tag tag-warn">Stativ</span>` : '';
  const fl = o.camera_hints?.[0]?.focal_length_mm
    ? `<span class="tag tag-blue">${o.camera_hints[0].focal_length_mm}mm</span>` : '';
  const verified = Verify.getLast(o.location_id)
    ? `<span class="tag tag-verified">✓ Geprüft</span>` : '';
  const rated = Rating.feedTagHtml(o.location_id);

  return `<div class="card" onclick="Detail.open(${JSON.stringify(o).replace(/"/g,'&quot;')})">
    <div class="opp-card">
      ${scoreRing(o.overall_score, o.alert_priority)}
      <div class="opp-body">
        <div class="opp-meta">
          <span class="opp-icon">${icon}</span>
          <span class="opp-type">${o.event_type}</span>
          <span class="opp-time">${formatTime(o.shoot_time)}</span>
        </div>
        <div class="opp-title">${o.title}</div>
        <div class="opp-location">📍 ${o.location_name}</div>
        <div class="opp-tags">${prio}${fl}${weatherTag}${stativ}${verified}${rated}</div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// FEED
// ═══════════════════════════════════════════════════════
const Feed = {
  data: [],
  mode: 'feed',  // 'feed' | 'calendar'
  setMode(m) {
    this.mode = m;
    document.getElementById('fmb-feed').classList.toggle('active', m === 'feed');
    document.getElementById('fmb-calendar').classList.toggle('active', m === 'calendar');
    if (m === 'calendar') {
      CalendarView.show();
    } else {
      this.render();
    }
  },
  async load() {
    // Nach dem Laden nur rendern wenn Feed-Mode aktiv ist
    const renderIfFeedMode = () => { if (this.mode === 'feed') this.render(); };
    const url = `/opportunities?min_score=${CFG.minScore}&days=14`;
    const _showError = () => {
      document.getElementById('feed-content').innerHTML =
        `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        </svg><p>Backend nicht erreichbar.<br><small>${CFG.api}</small></p>
        <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="App.refresh()">Erneut versuchen</button></div>`;
    };
    try {
      this.data = await API.get(url);
      renderIfFeedMode();
    } catch(e) {
      // SW-Aktivierungs-Race: einmaliger Auto-Retry nach 2 s
      setTimeout(async () => {
        try {
          this.data = await API.get(url);
          renderIfFeedMode();
        } catch { if (this.mode === 'feed') _showError(); }
      }, 2000);
    }
  },
  render() {
    if (this.mode !== 'feed') return;  // Kein Feed-Render im Kalender-Modus
    const el = document.getElementById('feed-content');
    const data = Filter.apply(this.data);
    const n = this.data.length, nf = data.length;
    if (!data.length) {
      const msg = Search.query
        ? `Keine Chancen für „${Search.query}" gefunden.`
        : n > 0
          ? `Filter aktiv: ${n} Chancen, ${nf} entsprechen den Kriterien.`
          : `Keine Chancen gefunden. Mindest-Score: ${pct(CFG.minScore)}`;
      el.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><p>${msg}</p></div>`;
      return;
    }

    // High-priority alerts
    const high = data.filter(o => o.alert_priority >= 2);
    let html = '';
    if (high.length) {
      const chips = high.slice(0,6).map(o =>
        `<div class="alert-chip" onclick="Detail.open(${JSON.stringify(o).replace(/"/g,'&quot;')})">
          <div class="chip-icon">${ICONS[o.event_type]||'📷'}</div>
          <div class="chip-day">${formatDate(o.shoot_time)}</div>
          <div class="chip-name">${o.location_name}</div>
        </div>`).join('');
      html += `<div id="alert-banner">
        <h3>⭐ Besondere Ereignisse (${high.length})</h3>
        <div class="alert-chips">${chips}</div>
      </div>`;
    }

    // Group by day
    const groups = {};
    for (const o of data) {
      const day = formatDate(o.shoot_time);
      if (!groups[day]) groups[day] = [];
      groups[day].push(o);
    }

    for (const [day, opps] of Object.entries(groups)) {
      const isToday = day === 'Heute';
      const icon = isToday ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>` :
        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
      html += `<div class="section-head">${icon}${day} · ${opps.length} Chancen${n !== nf ? ' <span style="color:var(--muted);font-weight:400">(von '+n+' gefiltert)</span>' : ''}</div>`;
      html += opps.map(oppCard).join('');
    }

    el.innerHTML = html;

    // Update header
    const today = data.filter(o => formatDate(o.shoot_time) === 'Heute');
    const best = today.length ? Math.max(...today.map(o=>o.overall_score)) : null;
    document.getElementById('header-subtitle').textContent =
      best ? `Heute: ${today.length} Chancen · Bester Score ${pct(best)}` : 'Berlin & Brandenburg';
  }
};

// ═══════════════════════════════════════════════════════
// JAHRESKALENDER
// ═══════════════════════════════════════════════════════
const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni',
                   'Juli','August','September','Oktober','November','Dezember'];
const DAYS_DE   = ['So','Mo','Di','Mi','Do','Fr','Sa'];

const CalendarView = {
  events: null,   // null = not loaded, [] = loaded (possibly empty)
  _loading: false,
  month: new Date().getMonth(),   // 0-based
  year: new Date().getFullYear(),

  async show() {
    const el = document.getElementById('feed-content');
    if (!this.events) {
      if (this._loading) return;  // Verhindert doppelten Ladevorgang bei schnellem Tab-Wechsel
      this._loading = true;
      el.innerHTML = `<div class="cal-loading"><div class="spinner"></div><span>Jahreskalender wird berechnet…<br><small>Beim ersten Start ca. 30–60 Sek.</small></span></div>`;
      await this.load();
      this._loading = false;
    }
    if (Feed.mode === 'calendar') this.render();
  },

  async load(retries = 3) {
    try {
      const res = await API.get('/calendar');
      if (res.status === 'calculating' && retries > 0) {
        // Noch in Berechnung – max. 3× nach 5s nochmal probieren
        await new Promise(r => setTimeout(r, 5000));
        return this.load(retries - 1);
      }
      this.events = res.events || [];
    } catch(e) {
      this.events = [];
      toast('Kalender konnte nicht geladen werden');
    }
  },

  prev() {
    if (this.month === 0) { this.month = 11; this.year--; }
    else this.month--;
    this.render();
  },

  next() {
    if (this.month === 11) { this.month = 0; this.year++; }
    else this.month++;
    this.render();
  },

  render() {
    const el = document.getElementById('feed-content');
    if (!this.events) { return; }

    // Filter auf aktuellen Monat
    const rawMonth = this.events.filter(e => {
      const d = new Date(e.shoot_time);
      return d.getFullYear() === this.year && d.getMonth() === this.month;
    });

    // Deduplizierung: pro Location + EventType + Tag nur bestes Event (höchster Score)
    const bestMap = new Map();
    for (const e of rawMonth) {
      const day = new Date(e.shoot_time).toISOString().slice(0, 10);
      const key = `${e.location_id}|${e.event_type}|${day}`;
      const existing = bestMap.get(key);
      if (!existing || e.overall_score > existing.overall_score) {
        bestMap.set(key, e);
      }
    }
    let monthEvents = Array.from(bestMap.values());

    // Alle aktiven Filter anwenden (Score, EventType, Tageszeit, Suche, …)
    monthEvents = Filter.apply(monthEvents);

    // Gruppieren nach Tag
    const groups = {};
    for (const e of monthEvents) {
      const d = new Date(e.shoot_time);
      const key = d.toISOString().slice(0, 10);
      if (!groups[key]) groups[key] = [];
      groups[key].push(e);
    }

    const totalYear = this.events.length;
    const searchHint = Search.query ? ` · Suche: „${Search.query}"` : '';
    let html = `
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="CalendarView.prev()">‹</button>
        <span class="cal-nav-title">${MONTHS_DE[this.month]} ${this.year}</span>
        <button class="cal-nav-btn" onclick="CalendarView.next()">›</button>
      </div>
      <div class="cal-status">${monthEvents.length} Events · ${totalYear} im Jahreskalender · nur Astronomie${searchHint}</div>`;

    if (!monthEvents.length) {
      html += `<div class="empty" style="padding-top:40px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>${Search.query ? `Keine Events für „${Search.query}" im ${MONTHS_DE[this.month]}.` : `Keine Events im ${MONTHS_DE[this.month]}.`}</p>
      </div>`;
    } else {
      for (const [dateKey, evts] of Object.entries(groups).sort()) {
        const d = new Date(dateKey + 'T12:00:00');
        const dayLabel = `${DAYS_DE[d.getDay()]}, ${d.getDate()}. ${MONTHS_DE[d.getMonth()]}`;
        html += `<div class="cal-day-head">${dayLabel} · ${evts.length} Events</div>`;

        for (const e of evts) {
          const icon = ICONS[e.event_type] || '📷';
          const t = new Date(e.shoot_time);
          // +2h CEST Annäherung
          const hh = String(t.getUTCHours() + 2).padStart(2,'0');
          const mm = String(t.getUTCMinutes()).padStart(2,'0');
          const prio = e.alert_priority >= 2 ? ' ⭐' : '';
          const moonTxt = e.moon_phase ? ` · ${e.moon_phase}` : '';
          html += `<div class="cal-event" onclick="Detail.open(${JSON.stringify(e).replace(/"/g,'&quot;')})">
            <div class="cal-event-icon">${icon}</div>
            <div class="cal-event-body">
              <div class="cal-event-title">${e.title}${prio}</div>
              <div class="cal-event-sub">${e.location_name} · ${hh}:${mm} Uhr${moonTxt}</div>
            </div>
            <div class="cal-event-score">${Math.round(e.overall_score * 100)}%</div>
          </div>`;
        }
      }
    }

    el.innerHTML = html;
  },
};

// ═══════════════════════════════════════════════════════
// STANDORT-VERIFIKATION (US-23)
// ═══════════════════════════════════════════════════════
const Verify = {
  _KEY: 'fotoalert_verifications',
  _ISSUE_TYPES: ['Koordinaten falsch','Brennweite falsch','Zugang gesperrt','Sichtachse blockiert','Street View falsch','Motiv verändert','Sonstiges'],

  // ── Datenzugriff ────────────────────────────────────────────────
  getAll() {
    try { return JSON.parse(localStorage.getItem(this._KEY) || '{}'); } catch { return {}; }
  },
  // Gibt Array aller Einträge zurück; migriert altes Einzelobjekt-Format
  getList(locationId) {
    const all = this.getAll();
    const raw = all[locationId];
    if (!raw) return [];
    if (Array.isArray(raw)) return raw;
    return [raw]; // Migration: altes Einzelobjekt → Array
  },
  getLast(locationId) {
    const list = this.getList(locationId);
    return list.length ? list[list.length - 1] : null;
  },
  append(locationId, locationName, comment, status, issueType) {
    const all = this.getAll();
    const list = this.getList(locationId);
    list.push({ location_name: locationName, date: new Date().toISOString().slice(0,10),
                comment: comment.trim(), status, issue_type: issueType });
    all[locationId] = list;
    localStorage.setItem(this._KEY, JSON.stringify(all));
  },
  removeLast(locationId) {
    const all = this.getAll();
    const list = this.getList(locationId);
    if (!list.length) return;
    list.pop();
    if (list.length) all[locationId] = list; else delete all[locationId];
    localStorage.setItem(this._KEY, JSON.stringify(all));
  },
  removeAll(locationId) {
    const all = this.getAll();
    delete all[locationId];
    localStorage.setItem(this._KEY, JSON.stringify(all));
  },

  // ── Formatierung ────────────────────────────────────────────────
  formatDate(isoDate) {
    return new Date(isoDate).toLocaleDateString('de-DE', { day:'numeric', month:'short', year:'2-digit' });
  },

  // Badge für Event-Detail (zeigt letzten Eintrag, Rückwärtskompatibilität)
  badgeHtml(locationId) {
    const v = this.getLast(locationId);
    if (!v) return '';
    if (v.status === 'issue') {
      const type = v.issue_type ? ` · ${v.issue_type}` : '';
      const cmt  = v.comment ? ` – „${v.comment}"` : '';
      return `<div class='verified-badge-issue'>⚠ Problem gemeldet am ${this.formatDate(v.date)}${type}${cmt}</div>`;
    }
    const cmt = v.comment ? ` · „${v.comment}"` : '';
    return `<div class='verified-badge'>✓ Vor Ort geprüft am ${this.formatDate(v.date)}${cmt}</div>`;
  },

  // Kompakter Card-Tag: zeigt letzten Status + Gesamtzähler
  cardTagHtml(locationId) {
    const list = this.getList(locationId);
    if (!list.length) return '';
    const nOk    = list.filter(v => v.status === 'ok').length;
    const nIssue = list.filter(v => v.status === 'issue').length;
    const last   = list[list.length - 1];
    if (last.status === 'issue')
      return `<span class='tag tag-issue'>⚠${nIssue > 1 ? ' ×'+nIssue : ''}${nOk ? ' · ✓×'+nOk : ''}</span>`;
    return `<span class='tag tag-verified'>✓${nOk > 1 ? ' ×'+nOk : ''}${nIssue ? ' · ⚠×'+nIssue : ''}</span>`;
  },

  // Timeline-HTML für Location-Detail
  _timelineHtml(locationId) {
    const list = this.getList(locationId);
    if (!list.length) return '<p style="font-size:12px;color:var(--muted)">Noch keine Verifikationen.</p>';

    const nOk    = list.filter(v => v.status === 'ok').length;
    const nIssue = list.filter(v => v.status === 'issue').length;

    const summary = `<div style="display:flex;gap:10px;margin-bottom:8px;font-size:13px;font-weight:600">
      ${nOk    ? `<span style="color:#4caf50">✓ ${nOk} Positiv</span>` : ''}
      ${nIssue ? `<span style="color:var(--red)">⚠ ${nIssue} Problem${nIssue>1?'e':''}</span>` : ''}
    </div>`;

    // Neueste zuerst
    const rows = [...list].reverse().map(v => {
      const isIssue = v.status === 'issue';
      const icon  = isIssue ? '⚠' : '✓';
      const color = isIssue ? 'var(--red)' : '#4caf50';
      const type  = isIssue && v.issue_type ? `<span style="color:var(--red);font-size:11px">${v.issue_type}</span>` : '';
      const cmt   = v.comment ? `<span style="color:var(--muted);font-size:11px">„${v.comment}"</span>` : '';
      return `<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">
        <span style="color:${color};font-size:14px;flex-shrink:0;width:16px">${icon}</span>
        <span style="font-size:12px;color:var(--muted);flex-shrink:0;width:72px">${this.formatDate(v.date)}</span>
        <div style="flex:1;display:flex;flex-direction:column;gap:2px">${type}${cmt}</div>
      </div>`;
    }).join('');

    return summary + `<div style="border-top:1px solid var(--border)">${rows}</div>`;
  },

  // ── Positiv-Form (Event-Detail, bestehend) ──────────────────────
  showForm(locationId, locationName) {
    const formId = 'verify-form-' + locationId.replace(/[^a-z0-9]/gi, '_');
    const el = document.getElementById(formId);
    if (el) { el.remove(); return; }
    const btn = document.getElementById('verify-btn-' + locationId.replace(/[^a-z0-9]/gi, '_'));
    const form = document.createElement('div');
    form.id = formId;
    form.className = 'verify-form';
    form.innerHTML = `
      <div style='font-size:13px;color:var(--muted)'>Optionaler Hinweis (z.B. Zugang, Besonderheiten):</div>
      <textarea id='verify-comment-${formId}' placeholder='z.B. Zugang ab Oktober gesperrt…'></textarea>
      <div class='verify-form-actions'>
        <button class='btn-verify' onclick='Verify.confirm("${locationId}","${locationName.replace(/'/g,"\\'")}","${formId}")'>✓ Bestätigen</button>
        <button class='btn-verify-cancel' onclick='document.getElementById("${formId}").remove()'>Abbrechen</button>
      </div>`;
    btn.insertAdjacentElement('afterend', form);
  },
  confirm(locationId, locationName, formId) {
    const comment = document.getElementById('verify-comment-' + formId)?.value || '';
    this.append(locationId, locationName, comment, 'ok', null);
    document.getElementById(formId)?.remove();
    toast('✅ Standort als geprüft markiert');
    setTimeout(() => Detail.close(), 800);
  },

  // ── Verifikations-UI für Location-Detail-Sheet ──────────────────
  verifySection(locationId, locationName) {
    const safeName = locationName.replace(/'/g, "\\'");
    const sid = 'loc-verify-section-' + locationId.replace(/[^a-z0-9]/gi,'_');
    const fid = 'loc-verify-form-' + locationId.replace(/[^a-z0-9]/gi,'_');
    const hasEntries = this.getList(locationId).length > 0;
    const resetBtn = hasEntries
      ? `<button class='btn-verify-cancel' style='font-size:11px;padding:4px 10px' onclick='Verify.resetLastFromDetail("${locationId}","${safeName}")'>Letzten Eintrag löschen</button>`
      : '';
    return `
      <div id="${sid}">
        ${this._timelineHtml(locationId)}
        <div style='display:flex;gap:8px;margin-top:10px'>
          <button class='btn-verify' style='flex:1;font-size:13px;padding:10px' onclick='Verify.showLocOkForm("${locationId}","${safeName}")'>✓ Vor Ort geprüft</button>
          <button class='btn-issue' style='flex:1;font-size:13px;padding:10px' onclick='Verify.showLocIssueForm("${locationId}","${safeName}")'>⚠ Problem melden</button>
        </div>
        ${resetBtn ? `<div style='margin-top:6px'>${resetBtn}</div>` : ''}
        <div id="${fid}"></div>
      </div>`;
  },

  showLocOkForm(locationId, locationName) {
    const fid = 'loc-verify-form-' + locationId.replace(/[^a-z0-9]/gi, '_');
    document.getElementById(fid).innerHTML = `
      <div class='verify-form' style='margin-top:10px'>
        <div style='font-size:13px;color:var(--muted)'>Optionaler Hinweis:</div>
        <textarea id='${fid}-txt' placeholder='z.B. Zugang über Nordeingang…'></textarea>
        <div class='verify-form-actions'>
          <button class='btn-verify' onclick='Verify.saveLocOk("${locationId}","${locationName.replace(/'/g,"\\'")}","${fid}")'>✓ Bestätigen</button>
          <button class='btn-verify-cancel' onclick='document.getElementById("${fid}").innerHTML=""'>Abbrechen</button>
        </div>
      </div>`;
  },

  showLocIssueForm(locationId, locationName) {
    const fid = 'loc-verify-form-' + locationId.replace(/[^a-z0-9]/gi, '_');
    const chips = this._ISSUE_TYPES.map(t =>
      `<span class='issue-chip' onclick='this.classList.toggle("selected")'>${t}</span>`
    ).join('');
    document.getElementById(fid).innerHTML = `
      <div class='verify-issue-form' style='margin-top:10px'>
        <div style='font-size:13px;font-weight:600;color:var(--red)'>Welches Problem liegt vor?</div>
        <div class='issue-chips'>${chips}</div>
        <textarea id='${fid}-txt' placeholder='Weitere Details (optional)…' style='background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;resize:vertical;min-height:56px;font-family:inherit'></textarea>
        <div class='verify-form-actions'>
          <button class='btn-issue' onclick='Verify.saveLocIssue("${locationId}","${locationName.replace(/'/g,"\\'")}","${fid}")'>⚠ Problem speichern</button>
          <button class='btn-verify-cancel' onclick='document.getElementById("${fid}").innerHTML=""'>Abbrechen</button>
        </div>
      </div>`;
  },

  saveLocOk(locationId, locationName, fid) {
    const comment = document.getElementById(fid + '-txt')?.value || '';
    this.append(locationId, locationName, comment, 'ok', null);
    this._refreshSection(locationId, locationName);
    toast('✅ Standort als geprüft markiert');
  },

  saveLocIssue(locationId, locationName, fid) {
    const selected = [...document.querySelectorAll(`#${fid} .issue-chip.selected`)].map(c => c.textContent);
    if (!selected.length) { toast('⚠ Bitte mindestens ein Problem auswählen'); return; }
    const comment = document.getElementById(fid + '-txt')?.value || '';
    this.append(locationId, locationName, comment, 'issue', selected.join(', '));
    this._refreshSection(locationId, locationName);
    toast('⚠ Problem gespeichert');
  },

  resetLastFromDetail(locationId, locationName) {
    this.removeLast(locationId);
    this._refreshSection(locationId, locationName);
    toast('Letzter Eintrag gelöscht');
  },

  _refreshSection(locationId, locationName) {
    const sid = 'loc-verify-section-' + locationId.replace(/[^a-z0-9]/gi, '_');
    const el = document.getElementById(sid);
    if (el) el.outerHTML = this.verifySection(locationId, locationName);
    const cardTag = document.getElementById('loc-card-tag-' + locationId.replace(/[^a-z0-9]/gi, '_'));
    if (cardTag) cardTag.innerHTML = this.cardTagHtml(locationId);
  },
};

// ═══════════════════════════════════════════════════════
// STAR RATING (US-24)
// ═══════════════════════════════════════════════════════
const Rating = {
  _KEY: 'fotoalert_ratings',

  getAll() {
    try { return JSON.parse(localStorage.getItem(this._KEY) || '{}'); } catch { return {}; }
  },
  get(locationId) {
    return this.getAll()[locationId] || null;
  },
  set(locationId, value) {
    const all = this.getAll();
    all[locationId] = value;
    localStorage.setItem(this._KEY, JSON.stringify(all));
  },
  remove(locationId) {
    const all = this.getAll();
    delete all[locationId];
    localStorage.setItem(this._KEY, JSON.stringify(all));
  },

  // ── Interaktive Sterne-Eingabe (für Location-Detail-Sheet) ──────
  inputHtml(locationId) {
    const current = this.get(locationId) || 0;
    const safe = locationId.replace(/[^a-z0-9]/gi, '_');
    const labels = ['','Schwach','Mäßig','Gut','Sehr gut','Exzellent'];
    const stars = [1,2,3,4,5].map(i =>
      `<span class="star-btn ${i <= current ? 'filled' : ''}"
        onclick="Rating._set('${locationId}', ${i})"
        title="${labels[i]}">★</span>`
    ).join('');
    const label = current
      ? `<span style="font-size:13px;color:var(--gold);font-weight:600">${labels[current]}</span>`
      : `<span style="font-size:12px;color:var(--muted)">Noch nicht bewertet – Stern tippen</span>`;
    const clearBtn = current
      ? `<button class="btn-verify-cancel" style="font-size:11px;padding:4px 10px;margin-top:8px"
           onclick="Rating._clear('${locationId}')">Bewertung löschen</button>`
      : '';
    return `<div id="rating-section-${safe}">
      <div class="star-input">${stars}</div>
      <div style="margin-top:4px">${label}</div>
      ${clearBtn}
    </div>`;
  },

  // ── Kompakte Anzeige für Location-Card ──────────────────────────
  displayHtml(locationId) {
    const v = this.get(locationId);
    if (!v) return '';
    const stars = [1,2,3,4,5].map(i =>
      `<span class="s ${i<=v?'on':'off'}">★</span>`
    ).join('');
    return `<span class="tag tag-gold" style="display:inline-flex;align-items:center;gap:1px;padding:2px 5px">
      <span class="star-display">${stars}</span>
    </span>`;
  },

  // ── Kompakte Anzeige für Feed-Card ──────────────────────────────
  feedTagHtml(locationId) {
    const v = this.get(locationId);
    if (!v) return '';
    return `<span class="tag tag-gold">⭐ ${'★'.repeat(v)}${'☆'.repeat(5-v)}</span>`;
  },

  _set(locationId, value) {
    this.set(locationId, value);
    this._refresh(locationId);
    toast('⭐ Bewertung gespeichert');
  },
  _clear(locationId) {
    this.remove(locationId);
    this._refresh(locationId);
    toast('Bewertung gelöscht');
  },
  _refresh(locationId) {
    const safe = locationId.replace(/[^a-z0-9]/gi, '_');
    // Sterne-Input im Detail-Sheet neu rendern
    const section = document.getElementById('rating-section-' + safe);
    if (section) section.outerHTML = this.inputHtml(locationId);
    // Karten-Tag aktualisieren
    const tag = document.getElementById('loc-rating-tag-' + safe);
    if (tag) tag.innerHTML = this.displayHtml(locationId);
  }
};

// ═══════════════════════════════════════════════════════
// FILTER (US-32)
// ═══════════════════════════════════════════════════════
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

const Filter = {
  _KEY: 'fotoalert_filters',
  _gps: null,

  _defaults() {
    return { eventTypes: [], tageszeit: [], difficulty: [], minRating: 0, minScore: 0, minFocal: 0, maxFocal: 0, maxDistKm: 0, verification: 'all' };
  },

  get state() {
    try { return Object.assign(this._defaults(), JSON.parse(localStorage.getItem(this._KEY) || '{}')); }
    catch { return this._defaults(); }
  },

  save(patch) {
    const s = Object.assign(this.state, patch);
    localStorage.setItem(this._KEY, JSON.stringify(s));
    this._updateBadge();
  },

  reset() {
    localStorage.removeItem(this._KEY);
    this._gps = null;
    this._updateBadge();
  },

  activeCount() {
    const s = this.state;
    return (s.eventTypes.length > 0 ? 1 : 0) +
           (s.tageszeit.length > 0 ? 1 : 0) +
           (s.difficulty.length > 0 ? 1 : 0) +
           (s.minRating > 0 ? 1 : 0) +
           (s.minScore > 0 ? 1 : 0) +
           (s.minFocal > 0 || s.maxFocal > 0 ? 1 : 0) +
           (s.maxDistKm > 0 ? 1 : 0) +
           (s.verification !== 'all' ? 1 : 0);
  },

  _updateBadge() {
    const n = this.activeCount();
    const badge = document.getElementById('filter-badge');
    if (badge) { badge.textContent = n; badge.style.display = n > 0 ? 'flex' : 'none'; }
    const btn = document.getElementById('filter-btn');
    if (btn) btn.style.color = n > 0 ? 'var(--gold)' : '';
  },

  apply(data) {
    const s = this.state;
    return data.filter(o => {
      if (s.eventTypes.length) {
        // "Goldene Stunde" matcht beide Backend-Werte; alle anderen 1:1
        const ET_EXPAND = { 'Goldene Stunde': ['Goldene Stunde Abend', 'Goldene Stunde Morgen'] };
        const expanded = s.eventTypes.flatMap(t => ET_EXPAND[t] || [t]);
        if (!expanded.includes(o.event_type)) return false;
      }
      if (s.tageszeit.length) {
        // Exakte Skyfield-Zeiten aus dem Backend nutzen (pro Location/Datum berechnet)
        // Fallback auf sunrise/sunset ± Margins wenn Detailfelder noch nicht im Cache
        const tm = new Date(o.shoot_time).getTime();
        let slot = 'nacht';
        if (o.blue_hour_morning_start && o.golden_hour_morning_end) {
          const bms = new Date(o.blue_hour_morning_start).getTime();
          const gme = new Date(o.golden_hour_morning_end).getTime();
          const gvs = o.golden_hour_evening_start ? new Date(o.golden_hour_evening_start).getTime() : null;
          const bve = o.blue_hour_evening_end ? new Date(o.blue_hour_evening_end).getTime() : null;
          if (tm >= bms && tm <= gme) slot = 'morgen';
          else if (gvs && bve && tm >= gvs && tm <= bve) slot = 'abend';
          else if (tm > gme && gvs && tm < gvs) slot = 'tag';
          // vor bms oder nach bve → bleibt 'nacht'
        } else if (o.sunrise_utc && o.sunset_utc) {
          // Fallback: sunrise/sunset ± Margins (45 min blaue Stunde + 90 min goldene Stunde)
          const sr = new Date(o.sunrise_utc).getTime();
          const ss = new Date(o.sunset_utc).getTime();
          if (tm >= sr - 45*60000 && tm <= sr + 90*60000) slot = 'morgen';
          else if (tm >= ss - 90*60000 && tm <= ss + 45*60000) slot = 'abend';
          else if (tm > sr + 90*60000 && tm < ss - 90*60000) slot = 'tag';
        }
        if (!s.tageszeit.includes(slot)) return false;
      }
      if (s.difficulty.length) {
        const loc = (Locations.all || []).find(l => l.id === o.location_id);
        if (loc && !s.difficulty.includes(loc.difficulty)) return false;
      }
      if (s.minRating > 0 && (Rating.get(o.location_id) || 0) < s.minRating) return false;
      if (s.minScore > 0 && o.overall_score < s.minScore / 100) return false;
      if (s.minFocal > 0 || s.maxFocal > 0) {
        const hints = o.camera_hints || [];
        if (s.minFocal > 0 && !hints.some(h => h.focal_length_mm >= s.minFocal)) return false;
        if (s.maxFocal > 0 && !hints.some(h => h.focal_length_mm <= s.maxFocal)) return false;
      }
      if (s.maxDistKm > 0 && this._gps) {
        const d = haversineKm(this._gps.lat, this._gps.lon, o.observer_lat, o.observer_lon);
        if (d > s.maxDistKm) return false;
      }
      if (s.verification !== 'all') {
        const last = Verify.getLast(o.location_id);
        if (s.verification === 'verified'   && (!last || last.status !== 'ok'))    return false;
        if (s.verification === 'unverified' && last)                                return false;
        if (s.verification === 'issues'     && (!last || last.status !== 'issue')) return false;
      }
      // Textsuche (US-53) – AND mit allen anderen Filtern; sucht in Name, Titel und Event-Typ
      if (Search.query) {
        const q = Search.query;
        const hay = [
          (o.location_name || ''),
          (o.title || ''),
          (o.event_type || ''),
        ].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  },

  // Filtert Locations nach Schwierigkeit, Rating, Verifikation und (falls Feed geladen) minScore
  applyToLocations(locs) {
    const s = this.state;
    return locs.filter(l => {
      if (s.difficulty.length && !s.difficulty.includes(l.difficulty)) return false;
      if (s.minRating > 0 && (Rating.get(l.id) || 0) < s.minRating) return false;
      if (s.verification !== 'all') {
        const last = Verify.getLast(l.id);
        if (s.verification === 'verified'   && (!last || last.status !== 'ok'))    return false;
        if (s.verification === 'unverified' && last)                                return false;
        if (s.verification === 'issues'     && (!last || last.status !== 'issue')) return false;
      }
      if (s.minScore > 0 && Feed.data && Feed.data.length) {
        // Nur Locations anzeigen, die mindestens eine Chance mit ausreichend Score haben
        const hasEvent = Feed.data.some(e => e.location_id === l.id && e.overall_score >= s.minScore / 100);
        if (!hasEvent) return false;
      }
      return true;
    });
  },

  async requestGps() {
    if (this._gps) return true;
    return new Promise(resolve => {
      if (!navigator.geolocation) { resolve(false); return; }
      navigator.geolocation.getCurrentPosition(
        p => { this._gps = {lat: p.coords.latitude, lon: p.coords.longitude}; resolve(true); },
        () => { toast('📍 GPS nicht verfügbar'); resolve(false); },
        {timeout: 8000}
      );
    });
  },
};

const FilterSheet = {
  // [value (muss = event_type aus Backend), label (Anzeige im Filter)]
  _ET: [
    ['Goldene Stunde', 'Goldene Stunde'],
    ['Blaue Stunde',   'Blaue Stunde'],
    ['Mondaufgang',           'Mondaufgang'],
    ['Monduntergang',         'Monduntergang'],
    ['Vollmond',              'Vollmond'],
    ['Mond-Alignment',        'Mond-Alignment'],
    ['Sonnen-Alignment',      'Sonnen-Alignment'],
    ['Milchstraße',           'Milchstraße'],
    ['Meteoritenschauer',     'Meteoritenschauer'],
    ['Sonnenfinsternis',      'Sonnenfinsternis'],
  ],

  open() {
    this._render();
    document.getElementById('filter-overlay').classList.add('open');
    document.getElementById('filter-sheet').classList.add('open');
    // BUG-04: Dual-Handle Slider Events initialisieren (nach _render DOM aufgebaut)
    requestAnimationFrame(() => this.initDualSlider());
  },

  initDualSlider() {
    const track = document.getElementById('focal-track');
    if (!track) return;
    const thumbMin = document.getElementById('focal-thumb-min');
    const thumbMax = document.getElementById('focal-thumb-max');
    const fill     = document.getElementById('focal-fill');
    const MAX_VAL  = 600, STEP = 25;

    const toVal = pct => Math.round(Math.max(0, Math.min(1, pct)) * MAX_VAL / STEP) * STEP;
    const toPct = v   => (v / MAX_VAL * 100).toFixed(2) + '%';

    const updateUI = () => {
      const mn = Filter.state.minFocal || 0;
      const mx = Filter.state.maxFocal || MAX_VAL;
      thumbMin.style.left = toPct(mn);
      thumbMax.style.left = toPct(mx);
      fill.style.left     = toPct(mn);
      fill.style.width    = toPct(mx - mn);
      FilterSheet._updateFocalLabel();
      Filter._updateBadge();
    };

    const drag = (e, isMin) => {
      e.preventDefault();
      const rect = track.getBoundingClientRect();
      const onMove = ev => {
        const cx  = (ev.touches ? ev.touches[0] : ev).clientX;
        const pct = (cx - rect.left) / rect.width;
        const v   = toVal(pct);
        if (isMin) {
          const cur = Filter.state.maxFocal || MAX_VAL;
          Filter.save({ minFocal: Math.min(v, cur - STEP) });
        } else {
          const cur = Filter.state.minFocal || 0;
          Filter.save({ maxFocal: Math.max(v, cur + STEP) });
        }
        updateUI();
        FilterSheet._applyLiveDebounced();  // Live-Vorschau beim Brennweiten-Drag
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend',  onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend',  onUp);
    };

    thumbMin.addEventListener('mousedown',  e => drag(e, true));
    thumbMin.addEventListener('touchstart', e => drag(e, true),  { passive: false });
    thumbMax.addEventListener('mousedown',  e => drag(e, false));
    thumbMax.addEventListener('touchstart', e => drag(e, false), { passive: false });
  },

  close() {
    document.getElementById('filter-overlay').classList.remove('open');
    document.getElementById('filter-sheet').classList.remove('open');
  },

  // Sofortiges Re-Render des aktuellen Views ohne Sheet zu schließen
  async _applyLive() {
    const s = Filter.state;
    if (s.maxDistKm > 0) await Filter.requestGps();
    Filter._updateBadge();
    if (App.current === 'locations') {
      Locations.render(Filter.applyToLocations(Locations.all));
    } else if (Feed.mode === 'feed') {
      Feed.render();
    } else if (Feed.mode === 'calendar') {
      CalendarView.render();
    }
  },

  // Debounced-Version für Slider (verhindert Flackern bei schnellem Ziehen)
  _liveTimer: null,
  _applyLiveDebounced() {
    clearTimeout(this._liveTimer);
    this._liveTimer = setTimeout(() => this._applyLive(), 150);
  },

  async apply() {
    await this._applyLive();
    this.close();
  },

  reset() {
    Filter.reset();
    this._render();
    requestAnimationFrame(() => this.initDualSlider());
    this._applyLive();
  },

  _toggle(key, val) {
    const s = Filter.state;
    const arr = [...(s[key] || [])];
    const idx = arr.indexOf(val);
    if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
    Filter.save({[key]: arr});
    this._render();
    requestAnimationFrame(() => this.initDualSlider());  // Slider-DOM nach _render neu verdrahten
    this._applyLive();
  },

  _set(key, val) {
    Filter.save({[key]: val});
    this._render();
    requestAnimationFrame(() => this.initDualSlider());  // Slider-DOM nach _render neu verdrahten
    this._applyLive();
  },

  _onScoreSlider(el) {
    const v = parseInt(el.value);
    el.style.setProperty('--pct', v + '%');
    const lbl = document.getElementById('filter-score-val');
    if (lbl) lbl.textContent = v === 0 ? 'Alle' : `≥ ${v} %`;
    Filter.save({ minScore: v });
    Filter._updateBadge();
    this._applyLiveDebounced();  // Live-Vorschau während Slider-Zug
  },

  _onFocalSlider(el) {
    const v = parseInt(el.value);
    const pct = Math.round(v / 600 * 100);
    el.style.setProperty('--pct', pct + '%');
    Filter.save({ minFocal: v });
    FilterSheet._updateFocalLabel();
    Filter._updateBadge();
  },

  _onFocalMaxSlider(el) {
    const v = parseInt(el.value);
    const pct = Math.round(v / 600 * 100);
    el.style.setProperty('--pct', pct + '%');
    Filter.save({ maxFocal: v });
    FilterSheet._updateFocalLabel();
    Filter._updateBadge();
  },

  _updateFocalLabel() {
    const lbl = document.getElementById('focal-val');
    if (!lbl) return;
    const mn = Filter.state.minFocal || 0;
    const mx = Filter.state.maxFocal || 0;
    if (!mn && !mx) lbl.textContent = 'Alle';
    else if (mn && !mx) lbl.textContent = `≥ ${mn} mm`;
    else if (!mn && mx) lbl.textContent = `≤ ${mx} mm`;
    else lbl.textContent = `${mn}–${mx} mm`;
  },

  _render() {
    const s = Filter.state;
    const chip = (label, active, onclick) =>
      `<span class="filter-chip${active ? ' active' : ''}" onclick="${onclick}">${label}</span>`;

    const etChips = this._ET.map(([v, l]) =>
      chip(`${ICONS[v] || '📷'} ${l}`, s.eventTypes.includes(v),
        `FilterSheet._toggle('eventTypes','${v.replace(/'/g, "\\'")}')`)).join('');

    const diffChips = [[1,'🟢 Einfach'],[2,'🟡 Mittel'],[3,'🔴 Anspruchsvoll']]
      .map(([v,l]) => chip(l, s.difficulty.includes(v), `FilterSheet._toggle('difficulty',${v})`)).join('');

    const ratingChips = [[0,'Alle'],[1,'≥ ★☆☆☆☆'],[2,'≥ ★★☆☆☆'],[3,'≥ ★★★☆☆'],[4,'≥ ★★★★☆'],[5,'★★★★★']]
      .map(([v,l]) => chip(l, s.minRating===v, `FilterSheet._set('minRating',${v})`)).join('');

    const distChips = [[0,'Alle'],[5,'< 5 km'],[15,'< 15 km'],[30,'< 30 km'],[50,'< 50 km']]
      .map(([v,l]) => chip(l, s.maxDistKm===v, `FilterSheet._set('maxDistKm',${v})`)).join('');

    const verChips = [['all','Alle'],['verified','✓ Geprüfte'],['unverified','Nicht geprüft'],['issues','⚠ Probleme']]
      .map(([v,l]) => chip(l, s.verification===v, `FilterSheet._set('verification','${v}')`)).join('');

    const gpsNote = s.maxDistKm > 0
      ? '<p style="font-size:11px;color:var(--muted);margin-top:8px">📍 GPS wird beim Anwenden abgefragt</p>' : '';

    const tzChips = [['morgen','🌄 Morgens'],['tag','☀️ Tagsüber'],['abend','🌇 Abends'],['nacht','🌙 Nacht']]
      .map(([v,l]) => chip(l, s.tageszeit.includes(v), `FilterSheet._toggle('tageszeit','${v}')`)).join('');

    const scoreLabel = s.minScore === 0 ? 'Alle' : `≥ ${s.minScore} %`;
    const scorePct = s.minScore + '%';
    const mn = s.minFocal || 0, mx = s.maxFocal || 0;
    const focalLabel = (!mn && !mx) ? 'Alle Brennweiten' : (mn && !mx) ? `≥ ${mn} mm` : (!mn && mx) ? `≤ ${mx} mm` : `${mn}–${mx} mm`;
    const focalMinPct = (mn / 600 * 100).toFixed(2) + '%';
    const focalMaxPct = ((mx || 600) / 600 * 100).toFixed(2) + '%';
    const focalRangePct = (((mx || 600) - mn) / 600 * 100).toFixed(2) + '%';

    document.getElementById('filter-content').innerHTML =
      `<div class="filter-section"><h4>📷 Eventtyp</h4><div class="filter-chips">${etChips}</div></div>` +
      `<div class="filter-section"><h4>🕐 Tageszeit</h4><div class="filter-chips">${tzChips}</div></div>` +
      `<div class="filter-section"><h4>🎯 Mindest-Wahrscheinlichkeit</h4>
        <div class="filter-slider-val" id="filter-score-val">${scoreLabel}</div>
        <div class="filter-slider-wrap">
          <input type="range" class="filter-slider" id="score-slider"
            min="0" max="100" step="5" value="${s.minScore}"
            style="--pct:${scorePct}"
            oninput="FilterSheet._onScoreSlider(this)">
          <div class="filter-slider-labels"><span>0 %</span><span>50 %</span><span>100 %</span></div>
        </div>
      </div>` +
      `<div class="filter-section"><h4>🔭 Brennweite</h4>
        <div class="filter-slider-val" id="focal-val">${focalLabel}</div>
        <div class="dual-range-wrap">
          <div class="dual-range-track" id="focal-track">
            <div class="dual-range-fill" id="focal-fill" style="left:${focalMinPct};width:${focalRangePct}"></div>
            <div class="dual-range-thumb" id="focal-thumb-min" style="left:${focalMinPct}"></div>
            <div class="dual-range-thumb" id="focal-thumb-max" style="left:${focalMaxPct}"></div>
          </div>
          <div class="filter-slider-labels"><span>0 mm</span><span>300 mm</span><span>600 mm</span></div>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:6px">Linker Handle = Min · Rechter = Max · 600 mm = kein Limit</p>
      </div>` +
      `<div class="filter-section"><h4>🎯 Schwierigkeitsgrad</h4><div class="filter-chips">${diffChips}</div></div>` +
      `<div class="filter-section"><h4>⭐ Mindest-Bewertung</h4><div class="filter-chips">${ratingChips}</div></div>` +
      `<div class="filter-section"><h4>📍 Entfernung (GPS)</h4><div class="filter-chips">${distChips}</div>${gpsNote}</div>` +
      `<div class="filter-section"><h4>✅ Verifikationsstatus</h4><div class="filter-chips">${verChips}</div></div>`;
  },
};

const Sections = {
  _key: 'fa_sec',
  _def: {
    ev_desc:true, ev_zeit:true, ev_wetter:false, ev_kamera:false,
    ev_astro:false, ev_topo:false, ev_kompo:false, ev_fov:false, ev_coords:false,
    loc_obs:true, loc_subj:true, loc_azimut:true, loc_links:false,
    loc_fov:false, loc_events:true, loc_rating:false, loc_verify:false
  },
  _onOpen: {},
  registerOnOpen(id, fn) { this._onOpen[id] = fn; },
  isOpen(id) {
    try { const s=JSON.parse(localStorage.getItem(this._key)||'{}'); return id in s ? s[id] : (this._def[id]??false); } catch { return this._def[id]??false; }
  },
  toggle(id) {
    try {
      const s=JSON.parse(localStorage.getItem(this._key)||'{}');
      s[id] = !this.isOpen(id);
      localStorage.setItem(this._key, JSON.stringify(s));
      const body=document.getElementById('sb_'+id);
      const chev=document.getElementById('sc_'+id);
      if(body) body.classList.toggle('open', s[id]);
      if(chev) chev.style.transform = s[id] ? 'rotate(0deg)' : 'rotate(-90deg)';
      if(s[id] && this._onOpen[id]) setTimeout(this._onOpen[id], 50);
    } catch {}
  }
};
function mkSec(id, title, content) {
  const open = Sections.isOpen(id);
  return `<div class="sheet-section"><h4 onclick="Sections.toggle('${id}')"><span>${title}</span><span id="sc_${id}" class="sec-chev" style="transform:rotate(${open?'0':'-90'}deg)">▼</span></h4><div class="section-body ${open?'open':''}" id="sb_${id}">${content}</div></div>`;
}

// US-58 · Kamera-Sichtfeld-Visualisierung
const CameraFOV = {
  _sensors: {
    fullframe:  { w:36,   h:24,   label:'Vollformat 36×24mm' },
    apsc_canon: { w:22.3, h:14.9, label:'APS-C Canon 22.3×14.9mm' },
    apsc_sony:  { w:23.5, h:15.6, label:'APS-C Sony/Nikon 23.5×15.6mm' },
    mft:        { w:17.3, h:13.0, label:'Micro Four Thirds 17.3×13mm' },
    one_inch:   { w:13.2, h:8.8,  label:'1"-Sensor 13.2×8.8mm' }
  },
  _maps: {},    // Leaflet-Map-Instanzen  { prefix: L.Map }
  _cones: {},   // FOV-Polygon-Layer      { prefix: L.Polygon }
  _data: {},    // Geodaten               { prefix: {obsLat,obsLon,subjLat,subjLon,distM} }

  _getProfile() {
    try { return Object.assign({sensor:'fullframe',fl:85,ori:'landscape'}, JSON.parse(localStorage.getItem('cameraProfile')||'{}')); }
    catch { return {sensor:'fullframe',fl:85,ori:'landscape'}; }
  },
  _saveProfile(p) { try { localStorage.setItem('cameraProfile', JSON.stringify(p)); } catch {} },

  _calcFOV(sensor, fl, ori) {
    const s = this._sensors[sensor] || this._sensors.fullframe;
    const dim = ori === 'portrait' ? s.h : s.w;
    return 2 * Math.atan(dim / (2 * fl)) * (180 / Math.PI);
  },

  _bearing(lat1, lon1, lat2, lon2) {
    const r = d => d * Math.PI / 180;
    const dL = r(lon2 - lon1);
    const y = Math.sin(dL) * Math.cos(r(lat2));
    const x = Math.cos(r(lat1)) * Math.sin(r(lat2)) - Math.sin(r(lat1)) * Math.cos(r(lat2)) * Math.cos(dL);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  },

  _destPoint(lat, lon, bearing, distM) {
    const R = 6371000, d = distM / R;
    const lat1 = lat * Math.PI / 180, brng = bearing * Math.PI / 180;
    const lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(brng));
    const lon2 = lon * Math.PI / 180 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(lat1), Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
    return [lat2 * 180/Math.PI, lon2 * 180/Math.PI];
  },

  panelHtml(prefix) {
    const p = this._getProfile();
    const opts = Object.entries(this._sensors).map(([k,v]) =>
      `<option value="${k}"${p.sensor===k?' selected':''}>${v.label}</option>`).join('');
    const d = this._data[prefix];
    const hasSub = d && d.subjLat;
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
        <select id="fov_sensor_${prefix}" onchange="CameraFOV.update('${prefix}')" style="font-size:12px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;flex:1;min-width:140px">${opts}</select>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" id="fov_fl_${prefix}" min="8" max="1200" value="${p.fl}" oninput="CameraFOV.update('${prefix}')" style="width:58px;font-size:12px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 6px;text-align:right">
          <span style="font-size:12px;color:var(--muted)">mm</span>
        </div>
        <select id="fov_ori_${prefix}" onchange="CameraFOV.update('${prefix}')" style="font-size:12px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px">
          <option value="landscape"${p.ori==='landscape'?' selected':''}>Querformat</option>
          <option value="portrait"${p.ori==='portrait'?' selected':''}>Hochformat</option>
        </select>
      </div>
      <div id="fov_info_${prefix}" style="font-size:12px;color:var(--muted);margin-bottom:8px">–</div>
      ${hasSub ? `<div id="map_fov_${prefix}" style="height:220px;border-radius:8px;overflow:hidden"></div>`
               : `<p style="font-size:12px;color:var(--muted)">Keine Motivkoordinaten – Karte nicht verfügbar.</p>`}`;
  },

  initMap(prefix, obsLat, obsLon, subjLat, subjLon, distM) {
    this._data[prefix] = { obsLat, obsLon, subjLat, subjLon,
      distM: distM || (subjLat ? haversineKm(obsLat, obsLon, subjLat, subjLon) * 1000 : 0) };
    const mapId = `map_fov_${prefix}`;
    if (!document.getElementById(mapId)) return;
    // Destroy existing instance
    if (this._maps[prefix]) { try { this._maps[prefix].remove(); } catch {} delete this._maps[prefix]; delete this._cones[prefix]; }
    const map = L.map(mapId, { zoomControl:true, attributionControl:false });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
    this._maps[prefix] = map;
    // Observer-Pin – identisch mit Setz-Karte (orange Kreis)
    L.circleMarker([obsLat, obsLon], {radius:10, color:'#f0a030', fillColor:'#f0a030', fillOpacity:.5, weight:2}).addTo(map);
    if (subjLat) {
      // Motiv-Pin – identisch mit Setz-Karte (Standard-Leaflet-Marker)
      L.marker([subjLat, subjLon]).addTo(map);
      // Sichtachse
      L.polyline([[obsLat, obsLon],[subjLat, subjLon]], {color:'#E8A020', weight:1.5, dashArray:'6,4', opacity:0.7}).addTo(map);
      map.fitBounds([[obsLat,obsLon],[subjLat,subjLon]], {padding:[30,30]});
    } else {
      map.setView([obsLat, obsLon], 15);
    }
    this._redrawCone(prefix);
    this._updateInfo(prefix);
  },

  _redrawCone(prefix) {
    const map = this._maps[prefix];
    const d = this._data[prefix];
    if (!map || !d || !d.subjLat) return;
    if (this._cones[prefix]) { try { map.removeLayer(this._cones[prefix]); } catch {} }
    const p = this._readInputs(prefix);
    const fovDeg = this._calcFOV(p.sensor, p.fl, p.ori);
    const bearing = this._bearing(d.obsLat, d.obsLon, d.subjLat, d.subjLon);
    const half = fovDeg / 2;
    const lPt = this._destPoint(d.obsLat, d.obsLon, bearing - half, d.distM);
    const rPt = this._destPoint(d.obsLat, d.obsLon, bearing + half, d.distM);
    this._cones[prefix] = L.polygon([[d.obsLat,d.obsLon], lPt, rPt], {
      color:'#E8A020', fillColor:'#E8A020', fillOpacity:0.13, weight:1.5
    }).addTo(map);
  },

  _readInputs(prefix) {
    const p = this._getProfile();
    const sEl = document.getElementById(`fov_sensor_${prefix}`);
    const fEl = document.getElementById(`fov_fl_${prefix}`);
    const oEl = document.getElementById(`fov_ori_${prefix}`);
    if (sEl) p.sensor = sEl.value;
    if (fEl) { const v = parseInt(fEl.value); if (v >= 8 && v <= 1200) p.fl = v; }
    if (oEl) p.ori = oEl.value;
    return p;
  },

  _updateInfo(prefix) {
    const d = this._data[prefix];
    const el = document.getElementById(`fov_info_${prefix}`);
    if (!el || !d || !d.subjLat) return;
    const p = this._readInputs(prefix);
    const fovDeg = this._calcFOV(p.sensor, p.fl, p.ori);
    const imgW = d.distM * 2 * Math.tan((fovDeg / 2) * Math.PI / 180);
    const fmtM = m => m >= 1000 ? (m/1000).toFixed(2)+' km' : Math.round(m)+' m';
    el.innerHTML = `<span style="color:var(--gold);font-weight:600">FOV: ${fovDeg.toFixed(1)}°</span> &nbsp;·&nbsp; Bildbreite am Motiv: <span style="color:var(--gold);font-weight:600">${fmtM(imgW)}</span>`;
  },

  update(prefix) {
    const p = this._readInputs(prefix);
    this._saveProfile(p);
    this._redrawCone(prefix);
    this._updateInfo(prefix);
  }
};

  addToCalendar(o) {
    if (typeof o === 'string') o = JSON.parse(o);
    const start = new Date(o.shoot_window_start);
    const end   = new Date(o.shoot_window_end);
    const fmt = d => d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const hints = o.camera_hints?.[0];
    const notes = hints
      ? `Brennweite: ${hints.focal_length_mm}mm | ${hints.aperture_suggestion} | ${hints.shutter_suggestion}\\n${hints.extra_tip||''}`
      : o.description;
    const ics = [
      'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//FotoAlert//DE',
      'BEGIN:VEVENT',
      `DTSTART:${fmt(start)}`, `DTEND:${fmt(end)}`,
      `SUMMARY:📸 ${o.title}`,
      `LOCATION:${o.location_name}`,
      `DESCRIPTION:${notes.replace(/\n/g,'\\n')}`,
      'END:VEVENT', 'END:VCALENDAR'
    ].join('\r\n');
    const blob = new Blob([ics], {type:'text/calendar'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `fotoalert_${o.id}.ics`;
    a.click();
    toast('📅 Kalenderdatei wird heruntergeladen');
  },
  setReminder(o) {
    if (typeof o === 'string') o = JSON.parse(o);
    if (!('Notification' in window)) { toast('Benachrichtigungen nicht unterstützt'); return; }
    Notification.requestPermission().then(perm => {
      if (perm !== 'granted') { toast('Bitte Benachrichtigungen erlauben'); return; }
      const ms = new Date(o.shoot_time) - Date.now() - 30*60*1000;
      if (ms < 0) { toast('Zeitpunkt liegt in der Vergangenheit'); return; }
      setTimeout(() => {
        new Notification(`📸 ${o.title}`, {
          body: `Jetzt aufbrechen – optimale Aufnahmezeit in 30 Minuten bei ${o.location_name}`,
          icon: '/icons/icon-192.png'
        });
      }, ms);
      toast(`🔔 Erinnerung gesetzt für ${formatTime(o.shoot_time)}`);
    });
  },
  openInMaps(lat, lon, label) {
    window.open(`https://maps.apple.com/?ll=${lat},${lon}&q=${label}`, '_blank');
  },
  openStreetView(lat, lon, heading) {
    // Google Maps URL API: map_action=pano navigiert direkt zum nächsten Street View Panorama
    // Kein API-Key nötig, heading = Azimut der Sichtachse
    const h = Math.round(heading);
    const url = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lon}&heading=${h}&pitch=0&fov=75`;
    window.open(url, '_blank');
  }
};

// MAP

const MapView = {
  map: null, markers: [], currentLayer: null,
  layers: {
    dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    standard:  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  },
  async init() {
    if (this.map) return;
    this.map = L.map('map', { zoomControl: false }).setView([52.52, 13.40], 10);
    this.currentLayer = L.tileLayer(this.layers.dark, {
      attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
    }).addTo(this.map);
    L.control.zoom({ position: 'bottomright' }).addTo(this.map);
    try { await this.loadMarkers(); } catch(e) {}
  },
  setLayer(name) {
    if (!this.map) return;
    if (this.currentLayer) this.map.removeLayer(this.currentLayer);
    this.currentLayer = L.tileLayer(this.layers[name], { maxZoom: 19 }).addTo(this.map);
    // Tile-Filter nur für dunkle Karte
    document.querySelectorAll('.leaflet-tile').forEach(t => {
      t.style.filter = name === 'dark' ? 'brightness(.85) saturate(.7)' : 'none';
    });
    document.querySelectorAll('.map-layer-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[onclick="MapView.setLayer('${name}')"]`).classList.add('active');
  },
  async loadMarkers() {
    const locs = await API.get('/locations');
    const catColor = { 'Schloss & Historisch':'#a070f0', 'Wasser & Spiegelung':'#5080f0',
      'Natur & Landschaft':'#4caf70', 'Milchstraße & Astro':'#8060d0',
      'Skyline & Architektur':'#f0a030', 'Aussichtspunkt':'#f08030', 'Industrie & Urban':'#f05050' };
    for (const loc of locs) {
      const col = catColor[loc.category] || '#f0a030';
      const icon = L.divIcon({ className:'', html:
        `<div style="width:28px;height:28px;background:${col};border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
        iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-32]
      });
      const m = L.marker([loc.observer_lat, loc.observer_lon], {icon}).addTo(this.map);
      m.bindPopup(`<div class="map-popup">
        <h4>${loc.name}</h4>
        <p>${loc.category}<br><small>${loc.description.slice(0,80)}…</small></p>
        <span class="popup-btn" onclick="App.nav('locations')">Details →</span>
      </div>`);
    }
  }
};

        <p id="edit-geocode-hint" style="font-size:11px;color:var(--muted);margin:-8px 0 12px">⊕ erkennt den Ortsnamen deines Standorts und generiert eine neue Beschreibung.</p>
        <label style="margin-top:12px">📍 Fotograf-Standort (Koordinaten)</label>
        <input class="input-field" id="edit-obs-coords" type="text" inputmode="text"
          placeholder="52.40747, 13.09279" value="${obsVal}"
          oninput="LocationDetail._onEditObsInput()">
        <p id="edit-obs-error" style="font-size:11px;color:#e05;margin:-8px 0 8px;min-height:14px"></p>
        <label>🎯 Motiv (Koordinaten)</label>
        <input class="input-field" id="edit-subj-coords" type="text" inputmode="text"
          placeholder="52.51234, 13.40123" value="${subjVal}"
          oninput="LocationDetail._onEditSubjInput()">
        <p id="edit-subj-error" style="font-size:11px;color:#e05;margin:-8px 0 8px;min-height:14px"></p>
        <div id="edit-mini-map" style="height:180px;border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--surface)"></div>
        <div class="edit-actions">
          <button class="btn-secondary" style="flex:1" onclick="LocationDetail.open('${loc.id}')">Abbrechen</button>
          <button class="btn-primary" style="flex:2" onclick="LocationDetail.saveEdit('${loc.id}')">Speichern</button>
        </div>
      </div>`;
    // Init mini-map after DOM ready
    requestAnimationFrame(() => LocationDetail._initEditMap());
  },

  _editMap: null, _editObsMarker: null, _editSubjMarker: null, _editLine: null,

  _initEditMap() {
    const loc = this._current;
    const center = [loc.observer_lat, loc.observer_lon];
    this._editMap = L.map('edit-mini-map', {zoomControl:true, attributionControl:false}).setView(center, 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {maxZoom:19}).addTo(this._editMap);
    // Observer marker (draggable circle)
    this._editObsMarker = L.circleMarker(center, {radius:10,color:'#f0a030',fillColor:'#f0a030',fillOpacity:.5,
      draggable:true}).addTo(this._editMap);
    // Workaround: use DivIcon draggable marker for obs
    this._editObsM = L.marker(center, {draggable:true,
      icon:L.divIcon({className:'', html:'<div style="width:22px;height:22px;border-radius:50%;background:#f0a030;opacity:.8;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>', iconAnchor:[11,11]})
    }).addTo(this._editMap);
    this._editObsM.on('dragend', e => {
      const {lat, lng} = e.target.getLatLng();
      document.getElementById('edit-obs-coords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      document.getElementById('edit-obs-error').textContent = '';
      this._drawEditLine();
    });
    if (loc.subject_lat && loc.subject_lon) {
      this._editSubjM = L.marker([loc.subject_lat, loc.subject_lon], {draggable:true}).addTo(this._editMap);
      this._editSubjM.on('dragend', e => {
        const {lat, lng} = e.target.getLatLng();
        document.getElementById('edit-subj-coords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        document.getElementById('edit-subj-error').textContent = '';
        this._drawEditLine();
      });
    } else {
      this._editSubjM = null;
    }
    this._editObsMarker.remove(); // Remove the non-draggable one
    this._drawEditLine();
  },

  _drawEditLine() {
    if (this._editLine) this._editLine.remove();
    if (!this._editMap || !this._editObsM) return;
    const obs = this._editObsM.getLatLng();
    if (this._editSubjM) {
      const subj = this._editSubjM.getLatLng();
      this._editLine = L.polyline([[obs.lat,obs.lng],[subj.lat,subj.lng]],
        {color:'#f0a030',weight:2,dashArray:'6 4',opacity:.7}).addTo(this._editMap);
    }
  },

  _parseEditCoords(val) {
    if (!val || !val.trim()) return null;
    val = val.trim();
    const dec = val.match(/(-?\d{1,3}\.?\d*)[,\s;]+(-?\d{1,3}\.?\d*)/);
    if (dec) {
      const lat = parseFloat(dec[1]), lon = parseFloat(dec[2]);
      if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) return {lat, lon};
    }
    const dms = val.match(/(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([NSns])[,\s]+(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([EWew])/);
    if (dms) {
      let lat = +dms[1] + +dms[2]/60 + +dms[3]/3600;
      if (/[Ss]/.test(dms[4])) lat = -lat;
      let lon = +dms[5] + +dms[6]/60 + +dms[7]/3600;
      if (/[Ww]/.test(dms[8])) lon = -lon;
      return {lat, lon};
    }
    return null;
  },

  _onEditObsInput() {
    const errEl = document.getElementById('edit-obs-error');
    const coords = this._parseEditCoords(document.getElementById('edit-obs-coords').value);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten'; return; }
    errEl.textContent = '';
    if (this._editObsM) { this._editObsM.setLatLng([coords.lat, coords.lon]); this._drawEditLine(); }
  },

  _onEditSubjInput() {
    const errEl = document.getElementById('edit-subj-error');
    const coords = this._parseEditCoords(document.getElementById('edit-subj-coords').value);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten'; return; }
    errEl.textContent = '';
    if (this._editSubjM) { this._editSubjM.setLatLng([coords.lat, coords.lon]); this._drawEditLine(); }
    else if (this._editMap) {
      this._editSubjM = L.marker([coords.lat, coords.lon], {draggable:true}).addTo(this._editMap);
      this._editSubjM.on('dragend', e => {
        const {lat, lng} = e.target.getLatLng();
        document.getElementById('edit-subj-coords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        document.getElementById('edit-subj-error').textContent = '';
        this._drawEditLine();
      });
      this._drawEditLine();
    }
  },

  async _geocodeDesc() {
    const loc = this._current;
    if (!loc) return;
    const btn = document.querySelector('.geocode-btn');
    const hint = document.getElementById('edit-geocode-hint');
    btn.textContent = '…'; btn.disabled = true;
    hint.textContent = 'Ortsnamen wird ermittelt…';
    try {
      const data = await API.get(`/reverse-geocode?lat=${loc.observer_lat}&lon=${loc.observer_lon}`);
      const place = data.place;
      const dist = loc.distance_m;
      const distTxt = dist >= 1000 ? `${(dist/1000).toFixed(1)} km` : `${Math.round(dist)} m`;
      const desc = place
        ? `Blick vom ${place} auf ${loc.subject_name}, ${distTxt} Entfernung.`
        : `Sichtachse auf ${loc.subject_name}, ${distTxt} Entfernung.`;
      document.getElementById('edit-desc').value = desc;
      hint.textContent = place ? `✓ Ortsname erkannt: ${place}` : '✓ Kein Ortsname gefunden – Beschreibung ohne Ortsangabe generiert.';
    } catch {
      hint.textContent = '✗ Ortsname konnte nicht ermittelt werden.';
    }
    btn.textContent = '⊕'; btn.disabled = false;
  },

  async saveEdit(locId) {
    const name = document.getElementById('edit-name').value.trim();
    const description = document.getElementById('edit-desc').value.trim();
    if (!name) { toast('Name darf nicht leer sein'); return; }

    // Parse coordinate fields
    const obsRaw = document.getElementById('edit-obs-coords')?.value.trim();
    const subjRaw = document.getElementById('edit-subj-coords')?.value.trim();
    const obsCoords = obsRaw ? this._parseEditCoords(obsRaw) : null;
    const subjCoords = subjRaw ? this._parseEditCoords(subjRaw) : null;
    if (obsRaw && !obsCoords) { toast('Ungültige Fotograf-Koordinaten'); return; }
    if (subjRaw && !subjCoords) { toast('Ungültige Motiv-Koordinaten'); return; }

    const body = {name, description};
    if (obsCoords) { body.observer_lat = obsCoords.lat; body.observer_lon = obsCoords.lon; }
    if (subjCoords) { body.subject_lat = subjCoords.lat; body.subject_lon = subjCoords.lon; }

    const btn = document.querySelector('.edit-actions .btn-primary');
    btn.textContent = 'Speichert…'; btn.disabled = true;
    try {
      await API.patch(`/locations/${locId}`, body);
      // In-Memory lokale Liste aktualisieren
      const loc = Locations.all.find(l => l.id === locId);
      if (loc) {
        loc.name = name; loc.description = description;
        if (obsCoords) { loc.observer_lat = obsCoords.lat; loc.observer_lon = obsCoords.lon; }
        if (subjCoords) { loc.subject_lat = subjCoords.lat; loc.subject_lon = subjCoords.lon; }
      }
      toast('✓ Location aktualisiert');
      LocationDetail.open(locId);
      Locations.render(Locations.all);
    } catch(e) {
      toast('Fehler: ' + e.message);
      btn.textContent = 'Speichern'; btn.disabled = false;
    }
  },

  _mapsUrl(lat, lon, label) {
    return `https://maps.apple.com/?ll=${lat},${lon}&q=${encodeURIComponent(label)}`;
  },
  _googleMapsUrl(lat, lon) {
    return `https://www.google.com/maps?q=${lat},${lon}`;
  },

  _render(loc) {
    const catIcon = { 'Schloss & Historisch':'🏰', 'Wasser & Spiegelung':'💧',
      'Natur & Landschaft':'🌲', 'Milchstraße & Astro':'✨',
      'Skyline & Architektur':'🏙', 'Aussichtspunkt':'🔭', 'Industrie & Urban':'🏭' };
    const diffLabel = {1:'Einfach', 2:'Mittel', 3:'Anspruchsvoll'};
    const diffCls   = {1:'diff-1', 2:'diff-2', 3:'diff-3'};

    const obsLat = loc.observer_lat.toFixed(5);
    const obsLon = loc.observer_lon.toFixed(5);
    const subjLat = loc.subject_lat ? loc.subject_lat.toFixed(5) : null;
    const subjLon = loc.subject_lon ? loc.subject_lon.toFixed(5) : null;

    const obsAppleUrl  = this._mapsUrl(loc.observer_lat, loc.observer_lon, 'Foto-Standort');
    const obsGoogleUrl = this._googleMapsUrl(loc.observer_lat, loc.observer_lon);
    const subjAppleUrl  = subjLat ? this._mapsUrl(loc.subject_lat, loc.subject_lon, loc.subject_name) : null;
    const subjGoogleUrl = subjLat ? this._googleMapsUrl(loc.subject_lat, loc.subject_lon) : null;
    const svHeading = loc.ideal_azimuth_range ? Math.round((loc.ideal_azimuth_range[0] + loc.ideal_azimuth_range[1]) / 2) : 0;
    const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${loc.observer_lat},${loc.observer_lon}&heading=${svHeading}&pitch=0&fov=75`;

    const distTxt = loc.distance_m ? (loc.distance_m >= 1000 ? `${(loc.distance_m/1000).toFixed(1)} km` : `${Math.round(loc.distance_m)} m`) : '–';
    const heightTxt = loc.subject_height_m ? `${loc.subject_height_m} m` : '–';
    const azTxt = loc.ideal_azimuth_range ? `${loc.ideal_azimuth_range[0]}°–${loc.ideal_azimuth_range[1]}°` : '–';
    const fls = (loc.focal_length_suggestions || []).map(f=>`<span class="tag tag-blue">${f}mm</span>`).join('');

    // US-35: possible_bodies vom Backend (berechnet per observer_lat + ideal_azimuth_range)
    const pb = Array.isArray(loc.possible_bodies) && loc.possible_bodies.length > 0
      ? loc.possible_bodies : null; // null = unbekannt → alle anzeigen
    const sunOk      = !pb || pb.includes('sun');
    const moonOk     = !pb || pb.includes('moon');
    const milkywayOk = !pb || pb.includes('milkyway');

    const bodyChipsHtml = pb ? `<div class="body-chips">
      ${sunOk      ? '<span class="body-chip possible">☀ Sonne</span>'       : '<span class="body-chip impossible">☀ Sonne</span>'}
      ${moonOk     ? '<span class="body-chip possible">🌙 Mond</span>'        : '<span class="body-chip impossible">🌙 Mond</span>'}
      ${milkywayOk ? '<span class="body-chip possible">🌌 Milchstraße</span>' : '<span class="body-chip impossible">🌌 Milchstraße</span>'}
    </div>` : '';

    const impossibleNames = [
      !sunOk ? 'Sonne' : null,
      !moonOk ? 'Mond' : null,
      !milkywayOk ? 'Milchstraße' : null,
    ].filter(Boolean);
    const bodyWarn = pb && impossibleNames.length > 0 ? `
      <div class="loc-impossible-warn" style="margin-top:10px">
        <p>⚠️ <strong>${impossibleNames.join(' & ')} ${impossibleNames.length > 1 ? 'können' : 'kann'} hier nie in der Sichtachse erscheinen</strong><br>
        Der Azimutbereich (${azTxt}) liegt außerhalb des astronomisch möglichen Auf-/Untergangsbereichs für ${impossibleNames.join(' & ')} – daher gibt es dafür keine Alignment-Events.</p>
      </div>` : '';

    return `
      <div class="sheet-hero" style="padding-bottom:12px">
        <div class="sheet-hero-type">
          ${catIcon[loc.category]||'📍'} <span>${loc.category}</span>
          <span class="loc-diff ${diffCls[loc.difficulty]||'diff-2'}" style="margin-left:auto">${diffLabel[loc.difficulty]||'Mittel'}</span>
          <button onclick="LocationDetail.openEdit()" style="margin-left:8px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 4px" title="Bearbeiten">✏️</button>
        </div>
        <div class="sheet-hero-title">${loc.name}</div>
        <p style="font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px">${loc.description}</p>
        ${fls ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">${fls}</div>` : ''}
      </div>

      ${mkSec('loc_obs','📍 Fotograf-Standort',`<div class="info-row"><span class="ir-label">Koordinaten</span><span class="ir-val" style="font-family:monospace;font-size:12px">${obsLat}°N, ${obsLon}°E</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><a class="loc-maps-btn" href="${obsAppleUrl}" target="_blank">🍎 Apple Maps</a><a class="loc-maps-btn" href="${obsGoogleUrl}" target="_blank">🗺 Google Maps</a><a class="loc-maps-btn" href="${svUrl}" target="_blank" style="color:#5b9cf6;border-color:#3a7bd5">👁 Street View</a></div>`)}

      ${mkSec('loc_subj',`🎯 Motiv – ${loc.subject_name}`,`${subjLat ? `<div class="info-row"><span class="ir-label">Koordinaten</span><span class="ir-val" style="font-family:monospace;font-size:12px">${subjLat}°N, ${subjLon}°E</span></div><div style="display:flex;gap:8px;margin-top:8px"><a class="loc-maps-btn" href="${subjAppleUrl}" target="_blank">🍎 Apple Maps</a><a class="loc-maps-btn" href="${subjGoogleUrl}" target="_blank">🗺 Google Maps</a></div>` : '<p style="font-size:12px;color:var(--muted)">Keine Motivkoordinaten vorhanden.</p>'}<div class="info-row" style="margin-top:8px"><span class="ir-label">Entfernung</span><span class="ir-val">${distTxt}</span></div>${loc.subject_height_m ? `<div class="info-row"><span class="ir-label">Bauwerkshöhe</span><span class="ir-val">${heightTxt}</span></div>` : ''}${Math.abs(loc.elevation_difference_m || 0) > 2 ? `<div class="info-row"><span class="ir-label">Niveaudiff.</span><span class="ir-val">${(loc.elevation_difference_m > 0 ? '+' : '')}${Math.round(loc.elevation_difference_m)} m ${loc.elevation_difference_m > 0 ? '↑ Motiv höher' : '↓ Standort höher'}</span></div>` : ''}`)}

      ${mkSec('loc_azimut','🔭 Ausrichtung',`<div class="info-row"><span class="ir-label">Idealer Azimut</span><span class="ir-val">${azTxt}</span></div><div class="info-row" style="align-items:flex-start"><span class="ir-label" style="padding-top:4px">Alignments</span><span class="ir-val">${bodyChipsHtml || '<span style="color:var(--muted);font-size:12px">–</span>'}</span></div>${bodyWarn}${sunOk && loc.solar_alignment_note ? `<p style="font-size:12px;color:var(--gold);margin-top:6px">☀ ${loc.solar_alignment_note}</p>` : ''}${moonOk && loc.lunar_alignment_note ? `<p style="font-size:12px;color:#c0c8f8;margin-top:4px">🌙 ${loc.lunar_alignment_note}</p>` : ''}${loc.access_note ? `<p style="font-size:12px;color:var(--muted);margin-top:4px">🚶 ${loc.access_note}</p>` : ''}`)}

      ${(() => {
        CameraFOV._data['loc'] = { obsLat:loc.observer_lat, obsLon:loc.observer_lon, subjLat:loc.subject_lat||null, subjLon:loc.subject_lon||null, distM:loc.distance_m||0 };
        return mkSec('loc_fov','📐 Karte & Blickwinkel', CameraFOV.panelHtml('loc'));
      })()}

      ${loc.locationscout_url ? mkSec('loc_links','🔗 Links',`<a class="loc-maps-btn" href="${loc.locationscout_url}" target="_blank" style="margin-top:4px">📷 Locationscout</a>`) : ''}

      <div class="sheet-section" id="loc-events-section">
        <h4 onclick="Sections.toggle('loc_events')" style="cursor:pointer;user-select:none;justify-content:space-between;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:0"><span>📅 Nächste Events</span><span id="sc_loc_events" class="sec-chev" style="transform:rotate(${Sections.isOpen('loc_events')?'0':'-90'}deg)">▼</span></h4>
        <div class="section-body ${Sections.isOpen('loc_events')?'open':''}" id="sb_loc_events"><div id="loc-events-content"><div class="empty" style="padding:20px"><div class="spinner"></div></div></div></div>
      </div>

      ${mkSec('loc_rating','⭐ Bewertung',`${Rating.inputHtml(loc.id)}`)}

      ${mkSec('loc_verify','✅ Verifikation',`${Verify.verifySection(loc.id, loc.name)}`)}
    `;
  },

  async _loadEvents(locId) {
    try {
      const data = await API.get(`/opportunities?location_id=${locId}&days=30&min_score=0.3`);
      const el = document.getElementById('loc-events-content');
      if (!el) return;
      if (!data || data.length === 0) {
        el.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">Keine Events in den nächsten 30 Tagen.</p>';
        return;
      }
      const eventIcon = e => {
        const t = (e.event_type||'').toLowerCase();
        if (t.includes('moon')) return '🌙';
        if (t.includes('sun')||t.includes('sonn')) return '☀️';
        if (t.includes('milch')||t.includes('milky')) return '🌌';
        if (t.includes('gold')) return '🌅';
        if (t.includes('blue')||t.includes('blau')) return '🌆';
        return '✦';
      };
      const fmt = iso => {
        const d = new Date(iso);
        return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'}) + ' ' +
               d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      };
      const rows = data.slice(0, 8).map(e => `
        <div class="loc-next-event-row" onclick="LocationDetail.close();setTimeout(()=>Detail.open(${JSON.stringify(e).replace(/"/g,'&quot;')}),300)">
          <div class="loc-next-event-icon">${eventIcon(e)}</div>
          <div class="loc-next-event-body">
            <div class="loc-next-event-title">${e.title}</div>
            <div class="loc-next-event-meta">${fmt(e.shoot_time)}</div>
          </div>
          <div class="loc-next-event-score">${Math.round((e.overall_score||0)*100)}%</div>
        </div>`).join('');
      el.innerHTML = rows;
    } catch(err) {
      const el = document.getElementById('loc-events-content');
      if (el) el.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">Events konnten nicht geladen werden.</p>';
    }
  }
};
