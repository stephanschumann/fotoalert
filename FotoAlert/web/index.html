const MapView = {
  map: null, markers: [], currentLayer: null,
  layers: {
    dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    standard:  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  },
  async init() {
    if (this.map) return;
    this.map = L.map('map', { zoomControl: false }).setView([52.52, 13.40], 10);
    this.currentLayer = L.tileLayer(this.layers.standard, {
      attribution: '© OpenStreetMap', maxZoom: 19
    }).addTo(this.map);
    L.control.zoom({ position: 'bottomright' }).addTo(this.map);
    try { await this.loadMarkers(); } catch(e) {}
  },
  setLayer(name) {
    if (!this.map) return;
    if (this.currentLayer) this.map.removeLayer(this.currentLayer);
    this.currentLayer = L.tileLayer(this.layers[name], { maxZoom: 19 }).addTo(this.map);
    // Tile-Filter nur für dunkle Karte
    document.querySelectorAll('.leaflet-tile').forEach(t => {
      t.style.filter = name === 'dark' ? 'brightness(.85) saturate(.7)' : 'none';
    });
    document.querySelectorAll('.map-layer-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[onclick="MapView.setLayer('${name}')"]`).classList.add('active');
  },
  async loadMarkers() {
    const locs = await API.get('/locations');
    const catColor = { 'Schloss & Historisch':'#a070f0', 'Wasser & Spiegelung':'#5080f0',
      'Natur & Landschaft':'#4caf70', 'Milchstraße & Astro':'#8060d0',
      'Skyline & Architektur':'#f0a030', 'Aussichtspunkt':'#f08030', 'Industrie & Urban':'#f05050' };
    this.markers = [];
    for (const loc of locs) {
      const col = catColor[loc.category] || '#f0a030';
      const icon = L.divIcon({ className:'', html:
        `<div style="width:28px;height:28px;background:${col};border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
        iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-32]
      });
      const m = L.marker([loc.observer_lat, loc.observer_lon], {icon}).addTo(this.map);
      m.bindPopup(`<div class="map-popup">
        <h4>${loc.name}</h4>
        <p>${loc.category}<br><small>${loc.description.slice(0,80)}…</small></p>
        <span class="popup-btn" onclick="LocationDetail.open('${loc.id}')">Details →</span>
      </div>`);
      this.markers.push({ marker: m, loc });
    }
    this.applyFilter();
  },

  // BUG-23: Eventtyp-Filter auf Kartenmarker anwenden (standortbasiert via possible_bodies)
  // Mapping: Mond-Events → "moon" in possible_bodies, Sonnen-Events → "sun" in possible_bodies
  // Goldene/Blaue Stunde → alle Locations (Sonne immer vorhanden)
  applyFilter() {
    if (!this.map) return;
    const s = Filter.state;
    const activeTypes = s.eventTypes || [];

    // BUG-23: Feed-basierter Filter – zeige nur Locations mit tatsächlichen Events
    // im 14-Tage-Feed für den gewählten Eventtyp (sinnvoller als possible_bodies).
    // Fallback auf possible_bodies wenn Feed noch nicht geladen.
    const ET_EXPAND = { 'Goldene Stunde': ['Goldene Stunde Abend', 'Goldene Stunde Morgen'] };
    const expanded = activeTypes.flatMap(t => ET_EXPAND[t] || [t]);

    // Baue Set der Location-IDs mit passenden Feed-Events (für O(1)-Lookup)
    let locIdsWithMatch = null;
    if (activeTypes.length > 0 && Feed.data && Feed.data.length > 0) {
      locIdsWithMatch = new Set(
        Feed.data
          .filter(e => expanded.includes(e.event_type))
          .map(e => e.location_id)
      );
    }

    for (const { marker, loc } of this.markers) {
      let visible = true;
      if (activeTypes.length > 0) {
        if (locIdsWithMatch !== null) {
          // Feed geladen: nur Locations mit echten Events in den nächsten 14 Tagen
          visible = locIdsWithMatch.has(loc.id);
        } else {
          // Fallback: possible_bodies (Feed noch nicht geladen)
          const pb = Array.isArray(loc.possible_bodies) ? loc.possible_bodies : [];
          const MOON_TYPES = ['Mond-Alignment', 'Mondaufgang', 'Monduntergang', 'Vollmond', 'Neumond', 'Blutmond', 'Mondfinsternis'];
          const SUN_TYPES  = ['Sonnen-Alignment', 'Sonnenaufgang', 'Sonnenuntergang', 'Sonnenfinsternis'];
          const needsMoon = activeTypes.some(t => MOON_TYPES.includes(t));
          const needsSun  = activeTypes.some(t => SUN_TYPES.includes(t));
          const hasBodylessType = activeTypes.some(t => !MOON_TYPES.includes(t) && !SUN_TYPES.includes(t));
          visible = hasBodylessType || (needsMoon && pb.includes('moon')) || (needsSun && pb.includes('sun'));
        }
      }
      if (visible) {
        if (!this.map.hasLayer(marker)) this.map.addLayer(marker);
      } else {
        if (this.map.hasLayer(marker)) this.map.removeLayer(marker);
      }
    }
  },

  // US-69: Karte auf aktuellen GPS-Standort zentrieren
  _gpsMarker: null,
  locateMe() {
    if (!this.map) return;
    if (!navigator.geolocation) {
      toast('GPS nicht verfügbar'); return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude: lat, longitude: lon } = pos.coords;
        this.map.setView([lat, lon], 13);
        const icon = L.divIcon({
          className: '',
          html: '<div class="gps-dot-wrap"><div class="gps-dot-ring"></div><div class="gps-dot"></div></div>',
          iconSize: [14, 14], iconAnchor: [7, 7],
        });
        if (this._gpsMarker) {
          this._gpsMarker.setLatLng([lat, lon]);
        } else {
          this._gpsMarker = L.marker([lat, lon], { icon, interactive: false }).addTo(this.map);
        }
      },
      (err) => {
        if (err.code === err.PERMISSION_DENIED) {
          toast('GPS-Zugriff nicht erlaubt');
        } else {
          toast('Standort konnte nicht ermittelt werden');
        }
      },
      { timeout: 10000, maximumAge: 60000 }
    );
  },
};

const Locations = {
  all: [],
  async load() {
    this.all = await API.get('/locations');
    this.render(Filter.applyToLocations(this.all));
  },
  // BUG-30: Live-Lookup des Locations-Namens — gibt Override-Namen zurück wenn
  // Locations.all schon befüllt ist, sonst Fallback auf den Cache-Snapshot.
  nameFor(locationId, fallback) {
    return this.all.find(l => l.id === locationId)?.name ?? fallback;
  },
  filter(q) {
    // Filter-Kriterien (Schwierigkeit, Rating, etc.) UND Textsuche kombinieren
    let f = Filter.applyToLocations(this.all);
    if (q) {
      f = f.filter(l =>
        l.name.toLowerCase().includes(q.toLowerCase()) ||
        l.description.toLowerCase().includes(q.toLowerCase()) ||
        l.category.toLowerCase().includes(q.toLowerCase())

          <textarea class="input-field" id="edit-desc" rows="3">${loc.description||''}</textarea>
          <button class="geocode-btn" onclick="LocationDetail._geocodeDesc()" title="Beschreibung via Standort-Erkennung füllen">⊕</button>
        </div>
        <p id="edit-geocode-hint" style="font-size:11px;color:var(--muted);margin:-8px 0 12px">⊕ erkennt den Ortsnamen deines Standorts und generiert eine neue Beschreibung.</p>

        <label style="margin-top:4px"><svg xmlns="http://www.w3.org/2000/svg" width="12" height="16" viewBox="0 0 28 38" style="vertical-align:middle;margin-right:4px"><path d="M14 2 C6 2 2 8 2 14 C2 24 14 36 14 36 C14 36 26 24 26 14 C26 8 22 2 14 2Z" fill="#E8A020" stroke="white" stroke-width="2.5"/><circle cx="14" cy="14" r="5" fill="white"/></svg>Fotograf-Standort (Koordinaten)</label>
        <input class="input-field" id="edit-obs-coords" type="text" inputmode="text"
          placeholder="52.40747, 13.09279" value="${obsVal}"
          oninput="LocationDetail._onEditObsInput()">
        <p id="edit-obs-error" style="font-size:11px;color:#e05;margin:-8px 0 8px;min-height:14px"></p>

        <label><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 32 32" style="vertical-align:middle;margin-right:4px"><line x1="16" y1="2" x2="16" y2="30" stroke="#E8A020" stroke-width="2.5" stroke-linecap="round"/><line x1="2" y1="16" x2="30" y2="16" stroke="#E8A020" stroke-width="2.5" stroke-linecap="round"/><circle cx="16" cy="16" r="5" fill="#E8A020" stroke="white" stroke-width="2.5"/></svg>Motiv (Koordinaten)</label>
        <input class="input-field" id="edit-subj-coords" type="text" inputmode="text"
          placeholder="52.51234, 13.40123" value="${subjVal}"
          oninput="LocationDetail._onEditSubjInput()">
        <p id="edit-subj-error" style="font-size:11px;color:#e05;margin:-8px 0 8px;min-height:14px"></p>
        <div id="edit-mini-map" style="height:180px;border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--surface)"></div>

        <label>Motivhöhe (m)</label>
        <input class="input-field" id="edit-subject-height" type="number" min="0" step="0.5"
          placeholder="z.B. 98 für den Berliner Dom"
          value="${loc.subject_height_m != null ? loc.subject_height_m : ''}">

        <label>Höhe Beobachterstandort über Gelände (m)</label>
        <input class="input-field" id="edit-observer-floor" type="number" min="0" step="1"
          placeholder="0 = Bodenniveau, z.B. 60 für Dach eines 6-Geschossers"
          value="${(loc.observer_floor_height_m || 0) > 0 ? loc.observer_floor_height_m : ''}">
        <p style="font-size:11px;color:var(--muted);margin:-8px 0 12px">Nur ausfüllen wenn du nicht auf Bodenniveau fotografierst (Dach, Hochhaus, Hügel-Aufstieg etc.)</p>

        <label>Brennweiten-Empfehlungen (mm, kommagetrennt)</label>
        <input class="input-field" id="edit-focal" type="text" inputmode="numeric"
          placeholder="z.B. 200, 400, 600"
          value="${(loc.focal_length_suggestions||[]).join(', ')}">

        <label>Schwierigkeit</label>
        <div style="display:flex;gap:8px;margin-bottom:14px">
          ${[['1','Einfach'],['2','Mittel'],['3','Anspruchsvoll']].map(([val,label]) => `
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;
              padding:8px;border-radius:8px;border:1px solid ${String(loc.difficulty||2)===val?'var(--gold)':'var(--border)'};
              background:${String(loc.difficulty||2)===val?'var(--gold-dim)':'transparent'};
              font-size:12px;font-weight:600;text-transform:none;letter-spacing:0;margin-bottom:0">
              <input type="radio" name="edit-difficulty" value="${val}"
                ${String(loc.difficulty||2)===val?'checked':''}
                onchange="this.closest('.edit-form').querySelectorAll('[name=edit-difficulty]').forEach(r=>{
                  r.closest('label').style.borderColor=r.checked?'var(--gold)':'var(--border)';
                  r.closest('label').style.background=r.checked?'var(--gold-dim)':'transparent';
                })">
              ${label}
            </label>`).join('')}
        </div>

        <label>Hinweise (Zugang, beste Jahreszeit etc.)</label>
        <textarea class="input-field" id="edit-special-notes" rows="2"
          placeholder="z.B. Parkgebühren, beste Zeit: April–August">${loc.special_notes||''}</textarea>

        <div class="edit-actions" style="margin-top:8px">
          <button class="btn-secondary" style="flex:1" onclick="LocationDetail.open('${loc.id}')">Abbrechen</button>
          <button class="btn-primary" style="flex:2" onclick="LocationDetail.saveEdit('${loc.id}')">Speichern</button>
        </div>
      </div>`;
    // Init mini-map after DOM ready
    requestAnimationFrame(() => LocationDetail._initEditMap());
  },

  _editMap: null, _editObsMarker: null, _editSubjMarker: null, _editLine: null,

  _initEditMap() {
    const loc = this._current;
    const center = [loc.observer_lat, loc.observer_lon];
    this._editMap = L.map('edit-mini-map', {zoomControl:true, attributionControl:false}).setView(center, 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {maxZoom:19}).addTo(this._editMap);
    // Observer marker draggable (MapMarkers-Standard, BUG-20)
    this._editObsMarker = null; // nicht mehr benötigt
    this._editObsM = MapMarkers.observerDraggable(center).addTo(this._editMap);
    this._editObsM.on('dragend', e => {
      const {lat, lng} = e.target.getLatLng();
      document.getElementById('edit-obs-coords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      document.getElementById('edit-obs-error').textContent = '';
      this._drawEditLine();
    });
    if (loc.subject_lat && loc.subject_lon) {
      this._editSubjM = MapMarkers.subjectDraggable([loc.subject_lat, loc.subject_lon]).addTo(this._editMap);
      this._editSubjM.on('dragend', e => {
        const {lat, lng} = e.target.getLatLng();
        document.getElementById('edit-subj-coords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        document.getElementById('edit-subj-error').textContent = '';
        this._drawEditLine();
      });
    } else {
      this._editSubjM = null;
    }
    // _editObsMarker wurde entfernt (BUG-20: nur noch _editObsM via MapMarkers)
    this._drawEditLine();
  },

  _drawEditLine() {
    if (this._editLine) this._editLine.remove();
    if (!this._editMap || !this._editObsM) return;
    const obs = this._editObsM.getLatLng();
    if (this._editSubjM) {
      const subj = this._editSubjM.getLatLng();
      this._editLine = L.polyline([[obs.lat,obs.lng],[subj.lat,subj.lng]],
        {color:'#f0a030',weight:2,dashArray:'6 4',opacity:.7}).addTo(this._editMap);
    }
  },

  _parseEditCoords(val) {
    if (!val || !val.trim()) return null;
    val = val.trim();
    const dec = val.match(/(-?\d{1,3}\.?\d*)[,\s;]+(-?\d{1,3}\.?\d*)/);
    if (dec) {
      const lat = parseFloat(dec[1]), lon = parseFloat(dec[2]);
      if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) return {lat, lon};
    }
    const dms = val.match(/(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([NSns])[,\s]+(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([EWew])/);
    if (dms) {
      let lat = +dms[1] + +dms[2]/60 + +dms[3]/3600;
      if (/[Ss]/.test(dms[4])) lat = -lat;
      let lon = +dms[5] + +dms[6]/60 + +dms[7]/3600;
      if (/[Ww]/.test(dms[8])) lon = -lon;
      return {lat, lon};
    }
    return null;
  },

  _onEditObsInput() {
    const errEl = document.getElementById('edit-obs-error');
    const coords = this._parseEditCoords(document.getElementById('edit-obs-coords').value);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten'; return; }
    errEl.textContent = '';
    if (this._editObsM) { this._editObsM.setLatLng([coords.lat, coords.lon]); this._drawEditLine(); }
  },

  _onEditSubjInput() {
    const errEl = document.getElementById('edit-subj-error');
    const coords = this._parseEditCoords(document.getElementById('edit-subj-coords').value);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten'; return; }
    errEl.textContent = '';
    if (this._editSubjM) { this._editSubjM.setLatLng([coords.lat, coords.lon]); this._drawEditLine(); }
    else if (this._editMap) {
      this._editSubjM = MapMarkers.subjectDraggable([coords.lat, coords.lon]).addTo(this._editMap);
      this._editSubjM.on('dragend', e => {
        const {lat, lng} = e.target.getLatLng();
        document.getElementById('edit-subj-coords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        document.getElementById('edit-subj-error').textContent = '';
        this._drawEditLine();
      });
      this._drawEditLine();
    }
  },

  async _geocodeDesc() {
    const loc = this._current;
    if (!loc) return;
    const btn = document.querySelector('.geocode-btn');
    const hint = document.getElementById('edit-geocode-hint');
    btn.textContent = '…'; btn.disabled = true;
    hint.textContent = 'Ortsnamen wird ermittelt…';
    try {
      const data = await API.get(`/reverse-geocode?lat=${loc.observer_lat}&lon=${loc.observer_lon}`);
      const place = data.place;
      const dist = loc.distance_m;
      const distTxt = dist >= 1000 ? `${(dist/1000).toFixed(1)} km` : `${Math.round(dist)} m`;
      const desc = place
        ? `Blick vom ${place} auf ${loc.subject_name}, ${distTxt} Entfernung.`
        : `Sichtachse auf ${loc.subject_name}, ${distTxt} Entfernung.`;
      document.getElementById('edit-desc').value = desc;
      hint.textContent = place ? `✓ Ortsname erkannt: ${place}` : '✓ Kein Ortsname gefunden – Beschreibung ohne Ortsangabe generiert.';
    } catch {
      hint.textContent = '✗ Ortsname konnte nicht ermittelt werden.';
    }
    btn.textContent = '⊕'; btn.disabled = false;
  },

  async saveEdit(locId) {
    const name = document.getElementById('edit-name').value.trim();
    const description = document.getElementById('edit-desc').value.trim();
    if (!name) { toast('Name darf nicht leer sein'); return; }

    // Koordinaten parsen
    const obsRaw = document.getElementById('edit-obs-coords')?.value.trim();
    const subjRaw = document.getElementById('edit-subj-coords')?.value.trim();
    const obsCoords = obsRaw ? this._parseEditCoords(obsRaw) : null;
    const subjCoords = subjRaw ? this._parseEditCoords(subjRaw) : null;
    if (obsRaw && !obsCoords) { toast('Ungültige Fotograf-Koordinaten'); return; }
    if (subjRaw && !subjCoords) { toast('Ungültige Motiv-Koordinaten'); return; }

    // Neue Felder einlesen
    const subject_name = (document.getElementById('edit-subject-name')?.value || '').trim();
    const category = document.getElementById('edit-category')?.value || '';
    const special_notes = (document.getElementById('edit-special-notes')?.value || '').trim();
    const heightRaw = (document.getElementById('edit-subject-height')?.value || '').trim();
    const subject_height_m = heightRaw !== '' ? parseFloat(heightRaw) : null;
    const floorRaw = (document.getElementById('edit-observer-floor')?.value || '').trim();
    const observer_floor_height_m = floorRaw !== '' ? parseFloat(floorRaw) : null;
    const focalRaw = (document.getElementById('edit-focal')?.value || '').trim();
    const focal_length_suggestions = focalRaw
      ? focalRaw.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n > 0)
      : [];
    const diffEl = document.querySelector('input[name="edit-difficulty"]:checked');
    const difficulty = diffEl ? parseInt(diffEl.value, 10) : 2;

    const body = {name, description, subject_name, category, special_notes, difficulty, focal_length_suggestions};
    if (subject_height_m !== null && !isNaN(subject_height_m)) body.subject_height_m = subject_height_m;
    if (observer_floor_height_m !== null && !isNaN(observer_floor_height_m) && observer_floor_height_m >= 0) body.observer_floor_height_m = observer_floor_height_m;
    if (obsCoords) { body.observer_lat = obsCoords.lat; body.observer_lon = obsCoords.lon; }
    if (subjCoords) { body.subject_lat = subjCoords.lat; body.subject_lon = subjCoords.lon; }

    const btn = document.querySelector('.edit-actions .btn-primary');
    btn.textContent = 'Speichert…'; btn.disabled = true;
    try {
      await API.patch(`/locations/${locId}`, body);
      // BUG-30: Locations.all frisch vom Server laden damit nameFor() überall
      // sofort den neuen Namen liefert (Feed-Karten, Opportunity-Detail-Link, Suche)
      Locations.all = await API.get('/locations');
      toast('✓ Location aktualisiert');
      LocationDetail.open(locId);
      Locations.render(Locations.all);
      // Feed und Kalender neu rendern damit location_name-Links sofort aktuell sind
      if (Feed.data) Feed.render();
    } catch(e) {
      toast('Fehler: ' + e.message);
      btn.textContent = 'Speichern'; btn.disabled = false;
    }
  },

  _mapsUrl(lat, lon, label) {
    return `https://maps.apple.com/?ll=${lat},${lon}&q=${encodeURIComponent(label)}`;
  },
  _googleMapsUrl(lat, lon) {
    return `https://www.google.com/maps?q=${lat},${lon}`;
  },

  _render(loc) {
    const catIcon = { 'Schloss & Historisch':'🏰', 'Wasser & Spiegelung':'💧',
      'Natur & Landschaft':'🌲', 'Milchstraße & Astro':'✨',
      'Skyline & Architektur':'🏙', 'Aussichtspunkt':'🔭', 'Industrie & Urban':'🏭' };
    const diffLabel = {1:'Einfach', 2:'Mittel', 3:'Anspruchsvoll'};
    const diffCls   = {1:'diff-1', 2:'diff-2', 3:'diff-3'};

    const obsLat = loc.observer_lat.toFixed(5);
    const obsLon = loc.observer_lon.toFixed(5);
    const subjLat = loc.subject_lat ? loc.subject_lat.toFixed(5) : null;
    const subjLon = loc.subject_lon ? loc.subject_lon.toFixed(5) : null;

    const obsAppleUrl  = this._mapsUrl(loc.observer_lat, loc.observer_lon, 'Foto-Standort');
    const obsGoogleUrl = this._googleMapsUrl(loc.observer_lat, loc.observer_lon);
    const subjAppleUrl  = subjLat ? this._mapsUrl(loc.subject_lat, loc.subject_lon, loc.subject_name) : null;
    const subjGoogleUrl = subjLat ? this._googleMapsUrl(loc.subject_lat, loc.subject_lon) : null;
    const svHeading = loc.ideal_azimuth_range ? Math.round((loc.ideal_azimuth_range[0] + loc.ideal_azimuth_range[1]) / 2) : 0;
    const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${loc.observer_lat},${loc.observer_lon}&heading=${svHeading}&pitch=0&fov=75`;

    const distTxt = loc.distance_m ? (loc.distance_m >= 1000 ? `${(loc.distance_m/1000).toFixed(1)} km` : `${Math.round(loc.distance_m)} m`) : '–';
    const heightTxt = loc.subject_height_m ? `${loc.subject_height_m} m` : '–';
    const azTxt = loc.ideal_azimuth_range ? `${loc.ideal_azimuth_range[0]}°–${loc.ideal_azimuth_range[1]}°` : '–';
    const fls = (loc.focal_length_suggestions || []).map(f=>`<span class="tag tag-blue">${f}mm</span>`).join('');

    // US-35: possible_bodies vom Backend (berechnet per observer_lat + ideal_azimuth_range)
    const pb = Array.isArray(loc.possible_bodies) && loc.possible_bodies.length > 0
      ? loc.possible_bodies : null; // null = unbekannt → alle anzeigen
    const sunOk      = !pb || pb.includes('sun');
    const moonOk     = !pb || pb.includes('moon');
    const milkywayOk = !pb || pb.includes('milkyway');

    const bodyChipsHtml = pb ? `<div class="body-chips">
      ${sunOk      ? '<span class="body-chip possible">☀ Sonne</span>'       : '<span class="body-chip impossible">☀ Sonne</span>'}
      ${moonOk     ? '<span class="body-chip possible">🌙 Mond</span>'        : '<span class="body-chip impossible">🌙 Mond</span>'}
      ${milkywayOk ? '<span class="body-chip possible">🌌 Milchstraße</span>' : '<span class="body-chip impossible">🌌 Milchstraße</span>'}
    </div>` : '';

    const impossibleNames = [
      !sunOk ? 'Sonne' : null,
      !moonOk ? 'Mond' : null,
      !milkywayOk ? 'Milchstraße' : null,
    ].filter(Boolean);
    const bodyWarn = pb && impossibleNames.length > 0 ? `
      <div class="loc-impossible-warn" style="margin-top:10px">
        <p>⚠️ <strong>${impossibleNames.join(' & ')} ${impossibleNames.length > 1 ? 'können' : 'kann'} hier nie in der Sichtachse erscheinen</strong><br>
        Der Azimutbereich (${azTxt}) liegt außerhalb des astronomisch möglichen Auf-/Untergangsbereichs für ${impossibleNames.join(' & ')} – daher gibt es dafür keine Alignment-Events.</p>
      </div>` : '';

    return `
      <div class="sheet-hero" style="padding-bottom:12px">
        <div class="sheet-hero-type">
          ${catIcon[loc.category]||'📍'} <span>${loc.category}</span>
          <span class="loc-diff ${diffCls[loc.difficulty]||'diff-2'}" style="margin-left:auto">${diffLabel[loc.difficulty]||'Mittel'}</span>
          <button onclick="LocationDetail.openEdit()" style="margin-left:8px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 4px" title="Bearbeiten">✏️</button>
        </div>
        <div class="sheet-hero-title">${loc.name}</div>
        <p style="font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px">${loc.description}</p>
        ${fls ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">${fls}</div>` : ''}
      </div>

      ${mkSec('loc_obs','📍 Fotograf-Standort',`<div class="info-row"><span class="ir-label">Koordinaten</span><span class="ir-val" style="font-family:monospace;font-size:12px">${obsLat}°N, ${obsLon}°E</span></div>${(loc.observer_floor_height_m||0) > 0 ? `<div class="info-row"><span class="ir-label">Gebäudehöhe</span><span class="ir-val">+${loc.observer_floor_height_m} m über Gelände</span></div>` : ''}<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><a class="loc-maps-btn" href="${obsAppleUrl}" target="_blank">🍎 Apple Maps</a><a class="loc-maps-btn" href="${obsGoogleUrl}" target="_blank">🗺 Google Maps</a><a class="loc-maps-btn" href="${svUrl}" target="_blank" style="color:#5b9cf6;border-color:#3a7bd5">👁 Street View</a></div>`)}

      ${mkSec('loc_subj',`🎯 Motiv – ${loc.subject_name}`,`${subjLat ? `<div class="info-row"><span class="ir-label">Koordinaten</span><span class="ir-val" style="font-family:monospace;font-size:12px">${subjLat}°N, ${subjLon}°E</span></div><div style="display:flex;gap:8px;margin-top:8px"><a class="loc-maps-btn" href="${subjAppleUrl}" target="_blank">🍎 Apple Maps</a><a class="loc-maps-btn" href="${subjGoogleUrl}" target="_blank">🗺 Google Maps</a></div>` : '<p style="font-size:12px;color:var(--muted)">Keine Motivkoordinaten vorhanden.</p>'}<div class="info-row" style="margin-top:8px"><span class="ir-label">Entfernung</span><span class="ir-val">${distTxt}</span></div>${loc.subject_height_m ? `<div class="info-row"><span class="ir-label">Bauwerkshöhe</span><span class="ir-val">${heightTxt}</span></div>` : ''}${Math.abs(loc.elevation_difference_m || 0) > 2 ? `<div class="info-row"><span class="ir-label">Niveaudiff.</span><span class="ir-val">${(loc.elevation_difference_m > 0 ? '+' : '')}${Math.round(loc.elevation_difference_m)} m ${loc.elevation_difference_m > 0 ? '↑ Motiv höher' : '↓ Standort höher'}</span></div>` : ''}`)}

      ${mkSec('loc_azimut','🔭 Ausrichtung',`<div class="info-row"><span class="ir-label">Idealer Azimut</span><span class="ir-val">${azTxt}</span></div><div class="info-row" style="align-items:flex-start"><span class="ir-label" style="padding-top:4px">Alignments</span><span class="ir-val">${bodyChipsHtml || '<span style="color:var(--muted);font-size:12px">–</span>'}</span></div>${bodyWarn}${sunOk && loc.solar_alignment_note ? `<p style="font-size:12px;color:var(--gold);margin-top:6px">☀ ${loc.solar_alignment_note}</p>` : ''}${moonOk && loc.lunar_alignment_note ? `<p style="font-size:12px;color:#c0c8f8;margin-top:4px">🌙 ${loc.lunar_alignment_note}</p>` : ''}${loc.access_note ? `<p style="font-size:12px;color:var(--muted);margin-top:4px">🚶 ${loc.access_note}</p>` : ''}`)}

      ${(() => {
        CameraFOV._data['loc'] = { obsLat:loc.observer_lat, obsLon:loc.observer_lon, subjLat:loc.subject_lat||null, subjLon:loc.subject_lon||null, distM:loc.distance_m||0 };
        return mkSec('loc_fov','📐 Karte & Blickwinkel', CameraFOV.panelHtml('loc'));
      })()}

      ${loc.locationscout_url ? mkSec('loc_links','🔗 Links',`<a class="loc-maps-btn" href="${loc.locationscout_url}" target="_blank" style="margin-top:4px">📷 Locationscout</a>`) : ''}

      <div class="sheet-section" id="loc-events-section">
        <h4 onclick="Sections.toggle('loc_events')" style="cursor:pointer;user-select:none;justify-content:space-between;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:0"><span>📅 Nächste Events</span><span id="sc_loc_events" class="sec-chev" style="transform:rotate(${Sections.isOpen('loc_events')?'0':'-90'}deg)">▼</span></h4>
        <div class="section-body ${Sections.isOpen('loc_events')?'open':''}" id="sb_loc_events"><div id="loc-events-content"><div class="empty" style="padding:20px"><div class="spinner"></div></div></div></div>
      </div>

      ${mkSec('loc_rating','⭐ Bewertung',`${Rating.inputHtml(loc.id)}`)}

      ${mkSec('loc_verify','✅ Verifikation',`${Verify.verifySection(loc.id, loc.name)}`)}
    `;
  },

  async _loadEvents(locId) {
    try {
      const data = await API.get(`/opportunities?location_id=${locId}&days=30&min_score=0.3`);
      const el = document.getElementById('loc-events-content');
      if (!el) return;
      if (!data || data.length === 0) {
        el.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">Keine Events in den nächsten 30 Tagen.</p>';
        return;
      }
      const eventIcon = e => {
        const t = (e.event_type||'').toLowerCase();
        if (t.includes('moon')) return '🌙';
        if (t.includes('sun')||t.includes('sonn')) return '☀️';
        if (t.includes('milch')||t.includes('milky')) return '🌌';
        if (t.includes('gold')) return '🌅';
        if (t.includes('blue')||t.includes('blau')) return '🌆';
        return '✦';
      };
      const fmt = iso => {
        const d = new Date(iso);
        return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'}) + ' ' +
               d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      };
      const rows = data.slice(0, 8).map(e => `
        <div class="loc-next-event-row" onclick="LocationDetail.close();setTimeout(()=>Detail.open(${JSON.stringify(e).replace(/"/g,'&quot;')}),300)">
          <div class="loc-next-event-icon">${eventIcon(e)}</div>
          <div class="loc-next-event-body">
            <div class="loc-next-event-title">${e.title}</div>
            <div class="loc-next-event-meta">${fmt(e.shoot_time)}</div>
          </div>
          <div class="loc-next-event-score">${Math.round((e.overall_score||0)*100)}%</div>
        </div>`).join('');
      el.innerHTML = rows;
    } catch(err) {
      const el = document.getElementById('loc-events-content');
      if (el) el.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">Events konnten nicht geladen werden.</p>';
    }
  }
};

// ADD LOCATION
// ═══════════════════════════════════════════════════════
const AddLocation = {
  map: null, obsMarker: null, subjMarker: null,
  obs: null, subj: null, previewData: null,
  mapMode: 'obs',  // 'obs' | 'subj'

  open() {
    document.getElementById('add-overlay').classList.add('open');
    document.getElementById('add-sheet').classList.add('open');
    setTimeout(() => this.initMap(), 300);
  },
  close() {
    document.getElementById('add-overlay').classList.remove('open');
    document.getElementById('add-sheet').classList.remove('open');
  },
  setMapMode(mode) {
    this.mapMode = mode;
    document.getElementById('mode-obs').classList.toggle('active', mode === 'obs');
    document.getElementById('mode-subj').classList.toggle('active', mode === 'subj');
    const hints = {
      obs:  '📍 Auf Karte tippen → Mein Standort setzen',
      subj: '🎯 Auf Karte tippen → Motiv setzen',
    };
    document.getElementById('add-map-hint').textContent = hints[mode];
  },
  initMap() {
    if (this.map) { this.map.invalidateSize(); return; }
    this.map = L.map('add-map', {zoomControl:true}).setView([52.52,13.40], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19, attribution: 'Tiles &copy; Esri'}).addTo(this.map);
    // Karte auf aktuelle User-Position zentrieren
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => this.map.setView([pos.coords.latitude, pos.coords.longitude], 14),
        () => {}  // Fehler → Berlin-Fallback bleibt
      );
    }
    this.map.on('click', e => {
      if (this.mapMode === 'obs') {
        this.setObserver(e.latlng.lat, e.latlng.lng);
        // Auto-switch to subject mode after observer is set
        if (!this.subj) this.setMapMode('subj');
      } else {
        this.setSubject(e.latlng.lat, e.latlng.lng);
      }
    });
    this.setMapMode('obs');
  },
  useMyLocation() {
    if (!navigator.geolocation) { toast('GPS nicht verfügbar'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      this.setObserver(pos.coords.latitude, pos.coords.longitude, true);
      toast('📍 Dein Standort gesetzt');
      if (!this.subj) this.setMapMode('subj');
    }, () => toast('GPS-Fehler – bitte manuell auf Karte tippen'));
  },
  setObserver(lat, lng, flyTo = false) {
    this.obs = {lat, lng};
    const el = document.getElementById('obs-coords');
    if (el) el.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    const errEl = document.getElementById('obs-error');
    if (errEl) errEl.textContent = '';
    if (this.obsMarker) this.obsMarker.remove();
    this.obsMarker = L.marker([lat,lng], {icon: MapMarkers.observer()}).addTo(this.map);
    if (flyTo && this.map) this.map.setView([lat, lng], 14);
    this.drawLine();
  },
  setSubject(lat, lng, flyTo = false) {
    this.subj = {lat, lng};
    const el = document.getElementById('subj-coords');
    if (el) el.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    const errEl = document.getElementById('subj-error');
    if (errEl) errEl.textContent = '';
    if (this.subjMarker) this.subjMarker.remove();
    this.subjMarker = L.marker([lat,lng], {icon: MapMarkers.subject()}).addTo(this.map);
    document.getElementById('add-map-hint').textContent = 'Motiv gesetzt – oder Modus wechseln zum Ändern';
    if (flyTo && this.map) this.map.setView([lat, lng], 14);
    this.drawLine();
  },
  _validateLatLon(lat, lon) {
    if (isNaN(lat) || isNaN(lon)) return 'Ungültige Koordinaten';
    if (lat < -90 || lat > 90) return 'Breitengrad muss zwischen −90° und +90° liegen';
    if (lon < -180 || lon > 180) return 'Längengrad muss zwischen −180° und +180° liegen';
    return null;
  },
  _parseCoords(text) {
    if (!text) return null;
    text = text.trim();
    // Dezimalgrad: "52.51234, 13.40123" oder mit Tab/Leerzeichen
    const dec = text.match(/(-?\d{1,3}\.?\d*)[,\s;]+(-?\d{1,3}\.?\d*)/);
    if (dec) {
      const lat = parseFloat(dec[1]), lon = parseFloat(dec[2]);
      if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) return {lat, lon};
    }
    // DMS: "52°30'44.4"N, 13°24'4.4"E" – auch mit Gradzeichen, Apostroph, Anführungszeichen
    const dms = text.match(/(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([NSns])[,\s]+(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([EWew])/);
    if (dms) {
      let lat = +dms[1] + +dms[2]/60 + +dms[3]/3600;
      if (/[Ss]/.test(dms[4])) lat = -lat;
      let lon = +dms[5] + +dms[6]/60 + +dms[7]/3600;
      if (/[Ww]/.test(dms[8])) lon = -lon;
      return {lat, lon};
    }
    return null;
  },
  async _pasteCoords(target) {
    let text;
    try {
      text = await navigator.clipboard.readText();
    } catch {
      toast('Clipboard-Zugriff verweigert – Koordinaten manuell eingeben');
      return;
    }
    const coords = this._parseCoords(text);
    if (!coords) { toast('Keine Koordinaten erkannt (Dezimal oder DMS)'); return; }
    if (target === 'obs') {
      this.setObserver(coords.lat, coords.lon, true);
      toast('📍 Standort aus Zwischenablage gesetzt');
      if (!this.subj) this.setMapMode('subj');
    } else {
      this.setSubject(coords.lat, coords.lon, true);
      toast('🎯 Motiv aus Zwischenablage gesetzt');
    }
  },
  _onObsInput() {
    const errEl = document.getElementById('obs-error');
    const val = document.getElementById('obs-coords').value.trim();
    if (!val) { errEl.textContent = ''; return; }
    const coords = this._parseCoords(val);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten – Dezimal (52.4, 13.1) oder DMS'; return; }
    const err = this._validateLatLon(coords.lat, coords.lon);
    if (err) { errEl.textContent = err; return; }
    errEl.textContent = '';
    this.obs = {lat: coords.lat, lng: coords.lon};
    if (this.obsMarker) this.obsMarker.remove();
    this.obsMarker = L.marker([coords.lat, coords.lon], {icon: MapMarkers.observer()}).addTo(this.map);
    this.drawLine();
  },
  _onSubjInput() {
    const errEl = document.getElementById('subj-error');
    const val = document.getElementById('subj-coords').value.trim();
    if (!val) { errEl.textContent = ''; return; }
    const coords = this._parseCoords(val);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten – Dezimal (52.4, 13.1) oder DMS'; return; }
    const err = this._validateLatLon(coords.lat, coords.lon);
    if (err) { errEl.textContent = err; return; }
    errEl.textContent = '';
    this.subj = {lat: coords.lat, lng: coords.lon};
    if (this.subjMarker) this.subjMarker.remove();
    this.subjMarker = L.marker([coords.lat, coords.lon], {icon: MapMarkers.subject()}).addTo(this.map);
    document.getElementById('add-map-hint').textContent = 'Motiv gesetzt – oder Modus wechseln zum Ändern';
    this.drawLine();
  },
  drawLine() {
    if (this._line) this._line.remove();
    if (this.obs && this.subj) {
      this._line = L.polyline([[this.obs.lat,this.obs.lng],[this.subj.lat,this.subj.lng]],
        {color:'#f0a030', weight:2, dashArray:'6 4', opacity:.7}).addTo(this.map);
    }
  },
  async preview() {
    if (!this.obs || !this.subj) { toast('Bitte Standort und Motiv setzen'); return; }
    const btn = document.querySelector('[onclick="AddLocation.preview()"]');
    btn.textContent = 'Berechne…'; btn.disabled = true;
    try {
      const body = {
        observer_lat: this.obs.lat, observer_lon: this.obs.lng,
        subject_lat:  this.subj.lat, subject_lon: this.subj.lng,
        subject_name: document.getElementById('subj-name').value || 'Unbenannt',
        subject_height_m: parseFloat(document.getElementById('subj-height').value) || 0,
        subject_width_m:  parseFloat(document.getElementById('subj-width').value)  || 0,
        days: 14
      };
      this.previewData = await API.post('/preview-alignment', body);
      this.renderPreview(this.previewData);
    } catch(e) {
      toast('Fehler: ' + e.message);
    }
    btn.textContent = 'Alignments berechnen ✦'; btn.disabled = false;
  },
  renderPreview(data) {
    const {profile, alignments} = data;
    const rows = alignments.slice(0,8).map(a => {
      const icon = a.body === 'sun' ? '☀️' : '🌙';
      return `<div class="align-row">
        <span class="ar-type">${icon} ${a.alignment_type}</span>
        <span class="ar-time">${formatDate(a.time)} ${formatTime(a.time)}</span>
        <span class="ar-score" style="color:${scoreColor(a.quality_score)}">${Math.round(a.quality_score*100)}%</span>
      </div>`;
    }).join('');

    document.getElementById('add-preview').innerHTML = `
      <div class="preview-box">
        <h4>Sichtachsen-Profil</h4>
        <div class="preview-stat"><span class="ps-label">Azimut (Richtung)</span><span class="ps-val">${profile.azimuth_deg.toFixed(1)}°</span></div>
        <div class="preview-stat"><span class="ps-label">Distanz</span><span class="ps-val">${Math.round(profile.ground_distance_m)} m</span></div>
        <div class="preview-stat"><span class="ps-label">Höhenwinkel Spitze</span><span class="ps-val">${profile.angular_altitude_top_deg.toFixed(2)}°</span></div>
        ${profile.angular_altitude_top_deg > 0 ? `<div class="preview-stat"><span class="ps-label">Empf. Brennweite</span><span class="ps-val">~${data.focal_length_mm}mm</span></div>` : ''}
        ${alignments.length > 0 ? `<div class="preview-alignments"><strong style="font-size:12px;color:var(--muted)">Nächste Alignments (14 Tage)</strong>${rows}</div>` : '<p style="font-size:12px;color:var(--muted);margin-top:8px">Keine Alignments in den nächsten 14 Tagen.</p>'}
      </div>`;
    document.getElementById('save-location-btn').style.display = 'flex';
  },
  async save() {
    if (!this.previewData) return;
    try {
      const body = {
        observer_lat: this.obs.lat, observer_lon: this.obs.lng,
        subject_lat:  this.subj.lat, subject_lon: this.subj.lng,
        subject_name: document.getElementById('subj-name').value || 'Unbenannt',
        subject_height_m: parseFloat(document.getElementById('subj-height').value) || 0,
        subject_width_m:  parseFloat(document.getElementById('subj-width').value)  || 0,
        save: true
      };
      await API.post('/preview-alignment', body);
      toast('✅ Location gespeichert!');
      this.close();
      await Locations.load();
    } catch(e) { toast('Fehler beim Speichern: ' + e.message); }
  }
};

  nav(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    document.getElementById('tab-'+page)?.classList.add('active');
    this.current = page;
    if (page === 'map') MapView.init();
    if (page === 'settings') Settings.render();
    if (page === 'locations') { if (Locations.all.length) Locations.render(Filter.applyToLocations(Locations.all)); else Locations.load(); }
  },
  async refresh() { RefreshMenu.toggle(); },  // Rückwärtskompatibilität
  async fullRefresh() {
    const btn = document.querySelector('[onclick="App.fullRefresh()"]');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Läuft…'; }
    try {
      await API.post('/refresh', {});
      toast('⏳ Vorberechnung gestartet (~2–5 Min.) – danach Refresh drücken');
    } catch(e) { toast('Fehler: ' + e.message); }
    if (btn) { btn.disabled = false; btn.textContent = 'Jetzt'; }
  },
  async init() {
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
    // Filter-Badge initialisieren
    Filter._updateBadge();
    // BUG-26: localStorage-Verifikationen einmalig migrieren, dann alle laden
    await Verify.migrateFromLocalStorage();
    await Verify.loadAll();
    // US-89: localStorage-Bewertungen einmalig migrieren, dann Aggregat-Cache laden
    await Rating.migrateFromLocalStorage();
    await Rating.loadAll();
    // BUG-30: Locations vorladen (kein Render, nur Daten) damit Locations.nameFor()
    // im Feed/Kalender-Detail sofort den aktuellen Namen liefert — ohne Locations-Tab-Besuch.
    Locations.all = await API.get('/locations');
    // Lade Feed (Verify._cache + Rating._cache/_mine sind jetzt befüllt → Badges/Filter korrekt)
    await Feed.load();
    // Wetter-Overlay läuft im Backend ~10s nach Start – dann stilles Re-Fetch
    setTimeout(async () => {
      await Feed.load();
    }, 12000);
  }
};

// ═══════════════════════════════════════════════════════
// US-34: Refresh-Menü
// ═══════════════════════════════════════════════════════
const RefreshMenu = {
  _open: false,
  _pollTimer: null,

  // Endpoint und Beschriftung je Job
  _cfg: {
    weather:  { endpoint: '/weather-refresh', label: 'Wetter aktualisieren',        doneMsg: '✅ Wetterdaten aktualisiert', reloadFeed: true  },
    feed:     { endpoint: '/refresh-feed',    label: '14-Tage-Feed berechnet',      doneMsg: '✅ Feed neu berechnet',       reloadFeed: true  },
    calendar: { endpoint: '/refresh-calendar',label: 'Jahreskalender berechnet',    doneMsg: '✅ Kalender neu berechnet',   reloadFeed: false },
  },

  toggle(e) {
    if (e) e.stopPropagation();
    this._open ? this.close() : this.open();
  },

  open() {
    this._open = true;
    document.getElementById('refresh-menu').classList.add('open');
    document.getElementById('refresh-btn').style.color = 'var(--gold)';
    this._loadStatus();
    // Schließen bei Klick außerhalb
    setTimeout(() => document.addEventListener('click', this._outsideHandler = (ev) => {
      if (!document.getElementById('refresh-menu-wrap').contains(ev.target)) this.close();
    }), 10);
  },

  close() {
    this._open = false;
    document.getElementById('refresh-menu').classList.remove('open');
    document.getElementById('refresh-btn').style.color = '';
    document.removeEventListener('click', this._outsideHandler);
    if (this._pollTimer) { clearInterval(this._pollTimer); this._pollTimer = null; }
  },

  async _loadStatus() {
    try {
      const data = await API.get('/job-status');
      this._applyStatus(data.jobs);
    } catch(e) { /* silent */ }
  },

  _applyStatus(jobs) {
    for (const [key, info] of Object.entries(jobs)) {
      const el = document.getElementById('rms-' + key);
      const row = document.getElementById('rmi-' + key);
      if (!el || !row) continue;
      if (info.status === 'running') {
        el.className = 'rmi-status';
        el.innerHTML = '<span class="rmi-spin">⟳</span> Läuft…';
        row.classList.add('running');
      } else if (info.status === 'done' && info.last_run) {
        row.classList.remove('running');
        const ago = this._ago(info.last_run);
        const dur = info.duration_s ? ` (${info.duration_s}s)` : '';
        el.className = 'rmi-status';
        el.textContent = `✓ vor ${ago}${dur}`;
      } else if (info.status === 'error') {
        row.classList.remove('running');
        el.className = 'rmi-status err';
        el.textContent = `✗ ${info.last_error || 'Fehler'}`;
      } else {
        el.className = 'rmi-status';
        el.textContent = '–';
      }
    }
  },

  _ago(isoStr) {
    const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (diff < 60) return `${diff}s`;
    if (diff < 3600) return `${Math.floor(diff/60)} Min.`;
    return `${Math.floor(diff/3600)} Std.`;
  },

  async trigger(key) {
    const cfg = this._cfg[key];
    if (!cfg) return;

    const el = document.getElementById('rms-' + key);
    const row = document.getElementById('rmi-' + key);
    el.className = 'rmi-status';
    el.innerHTML = '<span class="rmi-spin">⟳</span> Gestartet…';
    row.classList.add('running');

    try {
      await API.post(cfg.endpoint, {});
    } catch(e) {
      el.className = 'rmi-status err';
      el.textContent = '✗ ' + e.message;
      row.classList.remove('running');
      return;
    }

    // Polling bis Job fertig
    this._pollTimer = setInterval(async () => {
      try {
        const data = await API.get('/job-status');
        this._applyStatus(data.jobs);
        const jobInfo = data.jobs[key];
        if (jobInfo && jobInfo.status !== 'running') {
          clearInterval(this._pollTimer); this._pollTimer = null;
          if (jobInfo.status === 'done') {
            if (cfg.reloadFeed) await Feed.load();
            toast(cfg.doneMsg);
          }
        }
      } catch(e) { /* silent */ }
    }, 3000);
  }
};
