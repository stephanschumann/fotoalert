const AddLocation = {
  map: null, obsMarker: null, subjMarker: null,
  obs: null, subj: null, previewData: null,
  mapMode: 'obs',  // 'obs' | 'subj'

  open() {
    document.getElementById('add-overlay').classList.add('open');
    document.getElementById('add-sheet').classList.add('open');
    setTimeout(() => this.initMap(), 300);
  },
  close() {
    document.getElementById('add-overlay').classList.remove('open');
    document.getElementById('add-sheet').classList.remove('open');
  },
  setMapMode(mode) {
    this.mapMode = mode;
    document.getElementById('mode-obs').classList.toggle('active', mode === 'obs');
    document.getElementById('mode-subj').classList.toggle('active', mode === 'subj');
    const hints = {
      obs:  '📍 Auf Karte tippen → Mein Standort setzen',
      subj: '🎯 Auf Karte tippen → Motiv setzen',
    };
    document.getElementById('add-map-hint').textContent = hints[mode];
  },
  initMap() {
    if (this.map) { this.map.invalidateSize(); return; }
    this.map = L.map('add-map', {zoomControl:true}).setView([52.52,13.40], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19, attribution: 'Tiles &copy; Esri'}).addTo(this.map);
    // Karte auf aktuelle User-Position zentrieren
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => this.map.setView([pos.coords.latitude, pos.coords.longitude], 14),
        () => {}  // Fehler → Berlin-Fallback bleibt
      );
    }
    this.map.on('click', e => {
      if (this.mapMode === 'obs') {
        this.setObserver(e.latlng.lat, e.latlng.lng);
        // Auto-switch to subject mode after observer is set
        if (!this.subj) this.setMapMode('subj');
      } else {
        this.setSubject(e.latlng.lat, e.latlng.lng);
      }
    });
    this.setMapMode('obs');
  },
  useMyLocation() {
    if (!navigator.geolocation) { toast('GPS nicht verfügbar'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      this.setObserver(pos.coords.latitude, pos.coords.longitude, true);
      toast('📍 Dein Standort gesetzt');
      if (!this.subj) this.setMapMode('subj');
    }, () => toast('GPS-Fehler – bitte manuell auf Karte tippen'));
  },
  setObserver(lat, lng, flyTo = false) {
    this.obs = {lat, lng};
    const el = document.getElementById('obs-coords');
    if (el) el.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    const errEl = document.getElementById('obs-error');
    if (errEl) errEl.textContent = '';
    if (this.obsMarker) this.obsMarker.remove();
    this.obsMarker = L.circleMarker([lat,lng], {radius:10, color:'#f0a030', fillColor:'#f0a030', fillOpacity:.5}).addTo(this.map);
    if (flyTo && this.map) this.map.setView([lat, lng], 14);
    this.drawLine();
  },
  setSubject(lat, lng, flyTo = false) {
    this.subj = {lat, lng};
    const el = document.getElementById('subj-coords');
    if (el) el.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    const errEl = document.getElementById('subj-error');
    if (errEl) errEl.textContent = '';
    if (this.subjMarker) this.subjMarker.remove();
    this.subjMarker = L.marker([lat,lng]).addTo(this.map);
    document.getElementById('add-map-hint').textContent = 'Motiv gesetzt – oder Modus wechseln zum Ändern';
    if (flyTo && this.map) this.map.setView([lat, lng], 14);
    this.drawLine();
  },
  _validateLatLon(lat, lon) {
    if (isNaN(lat) || isNaN(lon)) return 'Ungültige Koordinaten';
    if (lat < -90 || lat > 90) return 'Breitengrad muss zwischen −90° und +90° liegen';
    if (lon < -180 || lon > 180) return 'Längengrad muss zwischen −180° und +180° liegen';
    return null;
  },
  _parseCoords(text) {
    if (!text) return null;
    text = text.trim();
    // Dezimalgrad: "52.51234, 13.40123" oder mit Tab/Leerzeichen
    const dec = text.match(/(-?\d{1,3}\.?\d*)[,\s;]+(-?\d{1,3}\.?\d*)/);
    if (dec) {
      const lat = parseFloat(dec[1]), lon = parseFloat(dec[2]);
      if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) return {lat, lon};
    }
    // DMS: "52°30'44.4"N, 13°24'4.4"E" – auch mit Gradzeichen, Apostroph, Anführungszeichen
    const dms = text.match(/(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([NSns])[,\s]+(\d+)[°\s]+(\d+)['′\s]+(\d+\.?\d*)[″"'′\s]*([EWew])/);
    if (dms) {
      let lat = +dms[1] + +dms[2]/60 + +dms[3]/3600;
      if (/[Ss]/.test(dms[4])) lat = -lat;
      let lon = +dms[5] + +dms[6]/60 + +dms[7]/3600;
      if (/[Ww]/.test(dms[8])) lon = -lon;
      return {lat, lon};
    }
    return null;
  },
  async _pasteCoords(target) {
    let text;
    try {
      text = await navigator.clipboard.readText();
    } catch {
      toast('Clipboard-Zugriff verweigert – Koordinaten manuell eingeben');
      return;
    }
    const coords = this._parseCoords(text);
    if (!coords) { toast('Keine Koordinaten erkannt (Dezimal oder DMS)'); return; }
    if (target === 'obs') {
      this.setObserver(coords.lat, coords.lon, true);
      toast('📍 Standort aus Zwischenablage gesetzt');
      if (!this.subj) this.setMapMode('subj');
    } else {
      this.setSubject(coords.lat, coords.lon, true);
      toast('🎯 Motiv aus Zwischenablage gesetzt');
    }
  },
  _onObsInput() {
    const errEl = document.getElementById('obs-error');
    const val = document.getElementById('obs-coords').value.trim();
    if (!val) { errEl.textContent = ''; return; }
    const coords = this._parseCoords(val);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten – Dezimal (52.4, 13.1) oder DMS'; return; }
    const err = this._validateLatLon(coords.lat, coords.lon);
    if (err) { errEl.textContent = err; return; }
    errEl.textContent = '';
    this.obs = {lat: coords.lat, lng: coords.lon};
    if (this.obsMarker) this.obsMarker.remove();
    this.obsMarker = L.circleMarker([coords.lat, coords.lon], {radius:10, color:'#f0a030', fillColor:'#f0a030', fillOpacity:.5}).addTo(this.map);
    this.drawLine();
  },
  _onSubjInput() {
    const errEl = document.getElementById('subj-error');
    const val = document.getElementById('subj-coords').value.trim();
    if (!val) { errEl.textContent = ''; return; }
    const coords = this._parseCoords(val);
    if (!coords) { errEl.textContent = 'Ungültige Koordinaten – Dezimal (52.4, 13.1) oder DMS'; return; }
    const err = this._validateLatLon(coords.lat, coords.lon);
    if (err) { errEl.textContent = err; return; }
    errEl.textContent = '';
    this.subj = {lat: coords.lat, lng: coords.lon};
    if (this.subjMarker) this.subjMarker.remove();
    this.subjMarker = L.marker([coords.lat, coords.lon]).addTo(this.map);
    document.getElementById('add-map-hint').textContent = 'Motiv gesetzt – oder Modus wechseln zum Ändern';
    this.drawLine();
  },
  drawLine() {
    if (this._line) this._line.remove();
    if (this.obs && this.subj) {
      this._line = L.polyline([[this.obs.lat,this.obs.lng],[this.subj.lat,this.subj.lng]],
        {color:'#f0a030', weight:2, dashArray:'6 4', opacity:.7}).addTo(this.map);
    }
  },
  async preview() {
    if (!this.obs || !this.subj) { toast('Bitte Standort und Motiv setzen'); return; }
    const btn = document.querySelector('[onclick="AddLocation.preview()"]');
    btn.textContent = 'Berechne…'; btn.disabled = true;
    try {
      const body = {
        observer_lat: this.obs.lat, observer_lon: this.obs.lng,
        subject_lat:  this.subj.lat, subject_lon: this.subj.lng,
        subject_name: document.getElementById('subj-name').value || 'Unbenannt',
        subject_height_m: parseFloat(document.getElementById('subj-height').value) || 0,
        subject_width_m:  parseFloat(document.getElementById('subj-width').value)  || 0,
        days: 14
      };
      this.previewData = await API.post('/preview-alignment', body);
      this.renderPreview(this.previewData);
    } catch(e) {
      toast('Fehler: ' + e.message);
    }
    btn.textContent = 'Alignments berechnen ✦'; btn.disabled = false;
  },
  renderPreview(data) {
    const {profile, alignments} = data;
    const rows = alignments.slice(0,8).map(a => {
      const icon = a.body === 'sun' ? '☀️' : '🌙';
      return `<div class="align-row">
        <span class="ar-type">${icon} ${a.alignment_type}</span>
        <span class="ar-time">${formatDate(a.time)} ${formatTime(a.time)}</span>
        <span class="ar-score" style="color:${scoreColor(a.quality_score)}">${Math.round(a.quality_score*100)}%</span>
      </div>`;
    }).join('');

    document.getElementById('add-preview').innerHTML = `
      <div class="preview-box">
        <h4>Sichtachsen-Profil</h4>
        <div class="preview-stat"><span class="ps-label">Azimut (Richtung)</span><span class="ps-val">${profile.azimuth_deg.toFixed(1)}°</span></div>
        <div class="preview-stat"><span class="ps-label">Distanz</span><span class="ps-val">${Math.round(profile.ground_distance_m)} m</span></div>
        <div class="preview-stat"><span class="ps-label">Höhenwinkel Spitze</span><span class="ps-val">${profile.angular_altitude_top_deg.toFixed(2)}°</span></div>
        ${profile.angular_altitude_top_deg > 0 ? `<div class="preview-stat"><span class="ps-label">Empf. Brennweite</span><span class="ps-val">~${data.focal_length_mm}mm</span></div>` : ''}
        ${alignments.length > 0 ? `<div class="preview-alignments"><strong style="font-size:12px;color:var(--muted)">Nächste Alignments (14 Tage)</strong>${rows}</div>` : '<p style="font-size:12px;color:var(--muted);margin-top:8px">Keine Alignments in den nächsten 14 Tagen.</p>'}
      </div>`;
    document.getElementById('save-location-btn').style.display = 'flex';
  },
  async save() {
    if (!this.previewData) return;
    try {
      const body = {
        observer_lat: this.obs.lat, observer_lon: this.obs.lng,
        subject_lat:  this.subj.lat, subject_lon: this.subj.lng,
        subject_name: document.getElementById('subj-name').value || 'Unbenannt',
        subject_height_m: parseFloat(document.getElementById('subj-height').value) || 0,
        subject_width_m:  parseFloat(document.getElementById('subj-width').value)  || 0,
        save: true
      };
      await API.post('/preview-alignment', body);
      toast('✅ Location gespeichert!');
      this.close();
      await Locations.load();
    } catch(e) { toast('Fehler beim Speichern: ' + e.message); }
  }
};

// ═══════════════════════════════════════════════════════
// SEARCH (US-53)
// ═══════════════════════════════════════════════════════
const Search = {
  _query: '',

  get query() { return this._query; },

  open() {
    document.getElementById('search-bar').classList.add('open');
    document.getElementById('search-input').focus();
  },

  close() {
    this._query = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-bar').classList.remove('open');
    this._triggerRender();
  },

  onInput(val) {
    this._query = val.trim().toLowerCase();
    this._triggerRender();
  },

  _triggerRender() {
    if (App.current === 'locations') Locations.filter(this._query);
    else if (Feed.mode === 'calendar') CalendarView.render();
    else Feed.render();
  },
};

// ═══════════════════════════════════════════════════════
// APP ROUTER
// ═══════════════════════════════════════════════════════
const App = {
  current: 'feed',
  nav(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    document.getElementById('tab-'+page)?.classList.add('active');
    this.current = page;
    if (page === 'map') MapView.init();
    if (page === 'settings') Settings.render();
    if (page === 'locations') { if (Locations.all.length) Locations.render(Filter.applyToLocations(Locations.all)); else Locations.load(); }
  },
  async refresh() {
    // Header-Button: nur Wetter-Overlay neu laden (schnell, ~10s)
    // Volle Vorberechnung (Astronomie) nur über Einstellungen
    const btn = document.getElementById('refresh-btn');
    btn.style.animation = 'spin .7s linear infinite';
    try {
      await API.post('/weather-refresh', {});
      await new Promise(r => setTimeout(r, 12000)); // Wetter-Overlay braucht ~10s
      await Feed.load();
      toast('✅ Wetterdaten aktualisiert');
    } catch(e) {
      // Fallback: einfach neu laden ohne API-Call (falls Endpoint fehlt)
      await Feed.load();
      toast('✅ Feed aktualisiert');
    }
    btn.style.animation = '';
  },
  async fullRefresh() {
    // Volle Vorberechnung (nur aus Einstellungen)
    const btn = document.querySelector('[onclick="App.fullRefresh()"]');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Läuft…'; }
    try {
      await API.post('/refresh', {});
      toast('⏳ Vorberechnung gestartet (~2–5 Min.) – danach Refresh drücken');
    } catch(e) { toast('Fehler: ' + e.message); }
    if (btn) { btn.disabled = false; btn.textContent = 'Jetzt'; }
  },
  async init() {
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
    // Filter-Badge initialisieren
    Filter._updateBadge();
    // Lade Feed
    await Feed.load();
    // Wetter-Overlay läuft im Backend ~10s nach Start – dann stilles Re-Fetch
    setTimeout(async () => {
      await Feed.load();
    }, 12000);
  }
};

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
App.init();
