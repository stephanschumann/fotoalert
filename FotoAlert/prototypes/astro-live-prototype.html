<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FotoAlert · Live-Astro Prototyp (PhotoPills-like)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{ --gold:#f6a800; --moon:#7fb2ff; --mw:#b06cff; --bg:#11151c; --panel:#1b2230; --txt:#e8edf4; --muted:#9aa6b8; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  #map{position:absolute;inset:0}
  .panel{position:absolute;z-index:1000;background:rgba(27,34,48,.94);backdrop-filter:blur(8px);border:1px solid #2c3650;border-radius:14px;padding:12px 14px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  #ctrl{top:10px;left:10px;right:10px;display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center}
  #ctrl label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
  #ctrl input[type=date]{background:#0d1119;color:var(--txt);border:1px solid #2c3650;border-radius:8px;padding:4px 6px;font-size:13px}
  #timeWrap{flex:1 1 260px;min-width:220px}
  #time{width:100%}
  .btn{background:#0d1119;color:var(--txt);border:1px solid #2c3650;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .btn.on{background:var(--gold);color:#1a1300;border-color:var(--gold);font-weight:600}
  #clock{font-variant-numeric:tabular-nums;font-size:15px;font-weight:600}
  #read{bottom:10px;left:10px;font-size:12px;line-height:1.5;max-width:230px}
  .row{display:flex;align-items:center;gap:7px}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .val{font-variant-numeric:tabular-nums;margin-left:auto;color:var(--muted)}
  #legend{bottom:10px;right:10px;font-size:11px;color:var(--muted)}
  .below{opacity:.45}
  h1{font-size:13px;margin:0 0 6px;color:var(--muted);font-weight:600;letter-spacing:.3px}
</style>
</head>
<body>
<div id="map"></div>

<div id="ctrl" class="panel">
  <label>Datum<input type="date" id="date"></label>
  <div id="timeWrap"><label>Uhrzeit (Berlin) · <span id="clock">–</span><input type="range" id="time" min="0" max="1439" step="1"></label></div>
  <button class="btn on" id="live">● Live</button>
</div>

<div id="read" class="panel">
  <h1>HIMMELSPOSITION</h1>
  <div class="row"><span class="dot" style="background:var(--gold)"></span>Sonne <span class="val" id="vSun">–</span></div>
  <div class="row"><span class="dot" style="background:var(--moon)"></span>Mond <span class="val" id="vMoon">–</span></div>
  <div class="row"><span class="dot" style="background:var(--mw)"></span>Milchstr.-Zentrum <span class="val" id="vMW">–</span></div>
  <div class="row" style="margin-top:5px;color:var(--muted)">Mondphase <span class="val" id="vPhase">–</span></div>
</div>

<div id="legend" class="panel">
  durchgezogen = über Horizont · transparent = darunter<br>
  dünn = Auf-/Untergangsrichtung · Pin ziehen = Standort
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
<script>
// ---------- Karte ----------
const start = [52.4009, 13.0591]; // Werder/Brandenburg
const map = L.map('map',{zoomControl:true}).setView(start, 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);

const pin = L.marker(start,{draggable:true}).addTo(map).bindTooltip('Fotostandort',{permanent:false});
pin.on('drag', render);

// ---------- Geodätischer Zielpunkt: Standort + Azimut + Distanz ----------
function dest(lat, lon, bearingDeg, distM){
  const R=6371000, d=distM/R, br=bearingDeg*Math.PI/180;
  const la1=lat*Math.PI/180, lo1=lon*Math.PI/180;
  const la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(br));
  const lo2=lo1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la1), Math.cos(d)-Math.sin(la1)*Math.sin(la2));
  return [la2*180/Math.PI, lo2*180/Math.PI];
}

// ---------- Astronomie (clientseitig, geschlossene Formel — kein Server) ----------
const A = Astronomy;
const GC = { ra: 17.7611, dec: -29.0078 }; // Milchstraßenzentrum (Sgr A*), J2000

function bodyHorizon(date, obs, body){
  const eq = A.Equator(body, date, obs, true, true);          // RA/Dec of-date
  const h  = A.Horizon(date, obs, eq.ra, eq.dec, 'normal');   // Azimut/Höhe
  return { az:h.azimuth, alt:h.altitude };
}
function pointHorizon(date, obs, ra, dec){
  const h = A.Horizon(date, obs, ra, dec, 'normal');
  return { az:h.azimuth, alt:h.altitude };
}
function riseSetAz(date, obs, body){
  const day0 = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const rise = A.SearchRiseSet(body, obs, +1, day0, 1);
  const set  = A.SearchRiseSet(body, obs, -1, day0, 1);
  const az = (t)=> t ? bodyHorizon(t.date, obs, body).az : null;
  return { rise: rise?az(rise):null, set: set?az(set):null };
}

// ---------- Render ----------
let lines = [];
function clearLines(){ lines.forEach(l=>map.removeLayer(l)); lines=[]; }
function draw(p, az, color, distM, weight, dashed){
  if(az==null) return;
  const e = dest(p.lat, p.lng, az, distM);
  lines.push(L.polyline([[p.lat,p.lng], e],
    {color, weight, opacity:dashed?0.5:0.95, dashArray:dashed?'4 6':null}).addTo(map));
}
const fmt = o => o.alt>=0 ? `${o.az.toFixed(0)}° · ${o.alt.toFixed(0)}° hoch`
                          : `${o.az.toFixed(0)}° · ${o.alt.toFixed(0)}° (unter Hor.)`;

function currentDate(){
  const d = document.getElementById('date').value.split('-').map(Number);
  const m = +document.getElementById('time').value;
  return new Date(d[0], d[1]-1, d[2], 0, 0, 0, 0).valueOf() ? new Date(d[0], d[1]-1, d[2], Math.floor(m/60), m%60) : new Date();
}

function render(){
  const p = pin.getLatLng();
  const obs = new A.Observer(p.lat, p.lng, 40);
  const date = currentDate();

  const sun  = bodyHorizon(date, obs, A.Body.Sun);
  const moon = bodyHorizon(date, obs, A.Body.Moon);
  const mw   = pointHorizon(date, obs, GC.ra, GC.dec);
  const sunRS  = riseSetAz(date, obs, A.Body.Sun);
  const moonRS = riseSetAz(date, obs, A.Body.Moon);
  const phase  = A.Illumination(A.Body.Moon, date).phase_fraction;

  clearLines();
  // Auf-/Untergangsrichtungen (dünn, immer)
  draw(p, sunRS.rise, getCss('--gold'), 4500, 2, true);
  draw(p, sunRS.set,  getCss('--gold'), 4500, 2, true);
  draw(p, moonRS.rise,getCss('--moon'), 4500, 2, true);
  draw(p, moonRS.set, getCss('--moon'), 4500, 2, true);
  // Aktuelle Richtungen (dick; transparent wenn unter Horizont)
  draw(p, sun.az,  getCss('--gold'), 3200, 5, sun.alt<0);
  draw(p, moon.az, getCss('--moon'), 3000, 5, moon.alt<0);
  draw(p, mw.az,   getCss('--mw'),   2800, 4, mw.alt<0);

  document.getElementById('vSun').textContent  = fmt(sun);
  document.getElementById('vMoon').textContent = fmt(moon);
  document.getElementById('vMW').textContent   = fmt(mw);
  document.getElementById('vPhase').textContent= Math.round(phase*100)+'% beleuchtet';
  document.getElementById('clock').textContent =
    date.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// ---------- Zeit-Steuerung ----------
const dateEl=document.getElementById('date'), timeEl=document.getElementById('time'), liveBtn=document.getElementById('live');
let liveTimer=null;
function setNow(){
  const n=new Date();
  dateEl.value=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  timeEl.value=n.getHours()*60+n.getMinutes();
}
function setLive(on){
  liveBtn.classList.toggle('on',on);
  if(on){ setNow(); render(); liveTimer=setInterval(()=>{setNow();render();},30000); }
  else if(liveTimer){ clearInterval(liveTimer); liveTimer=null; }
}
liveBtn.onclick=()=>setLive(!liveBtn.classList.contains('on'));
timeEl.oninput=()=>{ setLive(false); render(); };
dateEl.onchange=()=>{ setLive(false); render(); };

setNow();
render();
setLive(true);
</script>
</body>
</html>
