[pytest]
testpaths = tests
addopts = -ra -q
markers =
    offline: deterministisch, ohne Netzwerk/externe Dienste – läuft immer im Sandbox
    network: braucht externe Dienste (Open-Meteo etc.) – im Sandbox ggf. übersprungen
    api: braucht den FastAPI-Stack (fastapi/pydantic installiert)
    regression: aus Akzeptanzkriterien abgeleiteter Regressionstest (wächst pro Ticket)
    frontend: TASK-20 Frontend-Testroutine (Reporter pure-Python sandbox-sicher; Browser-Runner braucht Playwright+Server)
    slow: länger laufender Test (z.B. 365-Tage-Plan) – optional via -m "not slow" überspringen
