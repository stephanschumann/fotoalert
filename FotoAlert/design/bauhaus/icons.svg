      <g transform="translate(630,90) scale(2)"><path d="M4 8 H20 M4 12 H20 M4 16 H20"/><circle cx="9" cy="8" r="2.1" fill="#EAE6DB"/><circle cx="15" cy="12" r="2.1" fill="#EAE6DB"/><circle cx="8" cy="16" r="2.1" fill="#EAE6DB"/></g>
    </g>
