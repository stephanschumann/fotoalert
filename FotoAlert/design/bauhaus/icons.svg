      <g transform="translate(485,360) scale(2)"><circle cx="12" cy="12" r="9"/><path d="M8 12 11 15 16 9"/></g>
    </g>
    <g stroke="#C8472F">
      <g transform="translate(630,360) scale(2)"><path d="M12 4 21 19 3 19 Z"/><path d="M12 10 V14 M12 16.5 V16.6"/></g>
    </g>
    <g fill="#1A1A1A" stroke="none" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" text-anchor="middle">
