# FotoAlert – Automatisches Deployment via GitHub Actions
# Trigger: Push auf den main-Branch
#
# Voraussetzung (einmalig in GitHub unter Settings → Secrets einrichten):
#   DEPLOY_SSH_KEY           – Privater SSH-Key (Ed25519) für Zugriff auf Hetzner-Server
#   SERVER_IP                – IP-Adresse des Hetzner-Servers (z.B. 1.2.3.4)
#   SERVER_USER              – SSH-Username auf dem Server (fotoalert)
#   FOTOALERT_USER_PASSWORD  – Test-Passwort für Playwright-Login (TASK-21)
#   FOTOALERT_HOST_PASSWORD  – Host-Passwort für Dev-Server (TASK-21)
#   FOTOALERT_AUTH_SECRET    – Auth-Secret für Dev-Server (TASK-21)

name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  # Manueller Trigger: in GitHub unter Actions → Run workflow
  workflow_dispatch:

jobs:
  # TASK-21: Frontend-Test-Gate — läuft VOR dem Deploy.
  # Deploy startet nur wenn dieser Job UND test-backend (TASK-64) grün sind.
  test-frontend:
    name: Frontend-Check (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FOTOALERT_ENV: dev
      FOTOALERT_NO_BACKGROUND: "1"
      FOTOALERT_HOST_PASSWORD: ${{ secrets.FOTOALERT_HOST_PASSWORD }}
      FOTOALERT_USER_PASSWORD: ${{ secrets.FOTOALERT_USER_PASSWORD }}
      FOTOALERT_AUTH_SECRET: ${{ secrets.FOTOALERT_AUTH_SECRET }}

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4.2.2

      - name: Python 3.9 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Abhängigkeiten installieren
        working-directory: FotoAlert/backend
        run: pip install -r requirements.txt

      - name: Playwright Chromium installieren
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Dev-Server starten
        working-directory: FotoAlert/backend
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 \
            > /tmp/fotoalert-ci-server.log 2>&1 &
          echo $! > /tmp/fotoalert-ci-server.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "✅ Server bereit nach ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8000/health || \
            { echo "❌ Server nicht bereit"; cat /tmp/fotoalert-ci-server.log; exit 1; }

      - name: Frontend-Check ausführen
        working-directory: FotoAlert/backend
        run: |
          python3 tests/frontend/run_frontend_check.py \
            --base-url http://localhost:8000 \
            --password "$FOTOALERT_USER_PASSWORD" \
            --screenshot-root /tmp/qa-screenshots \
            --findings-json /tmp/findings.json

      - name: Findings + Screenshots als CI-Artefakt hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-findings-${{ github.run_id }}
          path: |
            /tmp/findings.json
            /tmp/qa-screenshots/
          if-no-files-found: ignore

      - name: Dev-Server stoppen
        if: always()
        run: |
          if [ -f /tmp/fotoalert-ci-server.pid ]; then
            kill "$(cat /tmp/fotoalert-ci-server.pid)" 2>/dev/null || true
          fi

  # TASK-64: Backend-Test-Gate — läuft parallel zum Frontend-Check.
  # Deploy startet nur wenn beide Jobs grün sind (needs: [test-frontend, test-backend]).
  test-backend:
    name: Backend-Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4.2.2

      - name: Python 3.9 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Abhängigkeiten installieren
        working-directory: FotoAlert/backend
        run: pip install -r requirements.txt

      # BUG-79: de421.bsp (~17 MB Ephemeride) wird von calculations/astronomy.py::_get_eph()
      # bei jedem ersten Aufruf pro Testprozess ungemockt via skyfield.api.load() geladen —
      # nicht nur von den 3 @pytest.mark.online-Tests, sondern transitiv von ≥9 Funktionen.
      # Fester Cache-Key (NICHT an requirements.txt/Commit-Hash gekoppelt, siehe Pre-Mortem
      # Szenario 4 in BACKLOG.md BUG-79) — die Ephemeridendatei ändert sich nicht mit Code.
      - name: Ephemeride (de421.bsp) aus CI-Cache wiederherstellen
        id: cache-ephemeris
        uses: actions/cache@v4
        with:
          path: FotoAlert/backend/de421.bsp
          key: de421-bsp-v1

      # Cache-Miss-Fallback: eigener, timeout-abgesicherter Download VOR pytest, damit der
      # eigentliche Testschritt selbst nie einen unbegrenzten Live-Download auslösen kann.
      # curl --max-time (90s) + Step-Timeout (2 Min) als zweite Absicherung, falls curl selbst
      # aus irgendeinem Grund nicht rechtzeitig abbricht (AK2/AK6: klarer Fehlschlag < 2 Min,
      # statt in den globalen 15-Minuten-Job-Timeout zu laufen, siehe Zeile ~101).
      - name: de421.bsp herunterladen (nur bei Cache-Miss, mit Timeout-Absicherung)
        if: steps.cache-ephemeris.outputs.cache-hit != 'true'
        timeout-minutes: 2
        working-directory: FotoAlert/backend
        run: |
          echo "Cache-Miss: lade de421.bsp (~17 MB) mit begrenztem Timeout, damit ein"
          echo "hängender/langsamer Drittserver nicht das 15-Minuten-Job-Limit reißt."
          curl -fSL --max-time 90 \
            -o de421.bsp \
            https://ssd.jpl.nasa.gov/ftp/eph/planets/bsp/de421.bsp \
            || { echo "❌ de421.bsp-Download fehlgeschlagen oder Timeout (90s) überschritten"; exit 1; }

      - name: Backend-Testsuite ausführen
        working-directory: FotoAlert/backend
        run: python3 -m pytest tests/ -v

  deploy:
    name: Deploy FotoAlert
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4.2.2

      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy auf Server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" \
              "bash /opt/fotoalert/app/FotoAlert/deploy/deploy.sh"

      - name: SSH-Key aufräumen
        if: always()
        run: rm -f ~/.ssh/deploy_key
